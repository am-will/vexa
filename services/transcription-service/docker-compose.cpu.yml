version: '3.8'

# CPU-only version for testing without GPU
services:
  # Nginx load balancer
  transcription-api:
    image: nginx:alpine
    container_name: transcription-lb-cpu
    ports:
      - "8083:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transcription-worker-1
      # - transcription-worker-2
      # - transcription-worker-3
    restart: unless-stopped
    networks:
      transcription-net:
      vexa-network:
        aliases:
          - transcription-service
          # Alias for vexa docker compose to connect to this dev transcription service

  # Worker 1 (CPU)
  transcription-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: transcription-worker-1-cpu
    environment:
      - WORKER_ID=1
      - MODEL_SIZE=${MODEL_SIZE:-medium}
      - DEVICE=cpu
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - CPU_THREADS=${CPU_THREADS:-0}
      - API_TOKEN=${API_TOKEN:-}
      - MAX_CONCURRENT_TRANSCRIPTIONS=${MAX_CONCURRENT_TRANSCRIPTIONS:-1}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-4}
      - FAIL_FAST_WHEN_BUSY=${FAIL_FAST_WHEN_BUSY:-true}
      - BUSY_RETRY_AFTER_S=${BUSY_RETRY_AFTER_S:-1}
      - BEAM_SIZE=${BEAM_SIZE:-5}
      - BEST_OF=${BEST_OF:-5}
      - VAD_FILTER=${VAD_FILTER:-true}
      - VAD_MIN_SILENCE_DURATION_MS=${VAD_MIN_SILENCE_DURATION_MS:-160}
      - REPETITION_PENALTY=${REPETITION_PENALTY:-1.1}
      - NO_REPEAT_NGRAM_SIZE=${NO_REPEAT_NGRAM_SIZE:-3}
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - transcription-net

  # # Worker 2 (CPU)
  # transcription-worker-2:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.cpu
  #   container_name: transcription-worker-2-cpu
  #   environment:
  #     - WORKER_ID=2
  #     - MODEL_SIZE=${MODEL_SIZE:-medium}
  #     - DEVICE=cpu
  #     - COMPUTE_TYPE=int8
  #     - CPU_THREADS=${CPU_THREADS:-0}
  #   volumes:
  #     - ./models:/app/models
  #   restart: unless-stopped
  #   networks:
  #     - transcription-net

  # # Worker 3 (CPU)
  # transcription-worker-3:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.cpu
  #   container_name: transcription-worker-3-cpu
  #   environment:
  #     - WORKER_ID=3
  #     - MODEL_SIZE=${MODEL_SIZE:-medium}
  #     - DEVICE=cpu
  #     - COMPUTE_TYPE=int8
  #     - CPU_THREADS=${CPU_THREADS:-0}
  #   volumes:
  #     - ./models:/app/models
  #   restart: unless-stopped
  #   networks:
  #     - transcription-net

networks:
  transcription-net:
    driver: bridge
  vexa-network:
    external: true
    name: vexa-network

