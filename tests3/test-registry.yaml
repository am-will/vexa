# tests3 test registry — single source of truth for:
#   1. Which tests run on which deployment mode (runs_in)
#   2. Test tiers (cheap / meeting / human) — what the release gate requires
#   3. Step IDs each test emits (bound to feature DoDs via evidence: {test, step})
#
# Used by tests3/lib/run-matrix.sh and tests3/lib/aggregate.py.
# Every test listed here MUST emit a JSON report at .state/reports/<mode>/<name>.json
# via test_begin/step_*/test_end (see tests3/lib/common.sh) — no stdout parsing.

tests:
  # ── Smoke tiers (from checks/run) ───────────────────────────────
  # Each tier writes its own .state/reports/<mode>/smoke-<tier>.json artifact.
  # Step IDs are the check IDs from checks/registry.json.
  smoke-static:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: checks/run --tier static --json-out $STATE/reports/$MODE/smoke-static.json
    features: [infrastructure, auth-and-limits, dashboard]
    max_duration_sec: 30

  smoke-env:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: checks/run --tier env --json-out $STATE/reports/$MODE/smoke-env.json
    features: [authenticated-meetings, browser-session, infrastructure]
    max_duration_sec: 30

  smoke-health:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: checks/run --tier health --json-out $STATE/reports/$MODE/smoke-health.json
    features: [infrastructure, realtime-transcription]
    max_duration_sec: 60

  smoke-contract:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: checks/run --tier contract --json-out $STATE/reports/$MODE/smoke-contract.json
    features:
      - auth-and-limits
      - bot-lifecycle
      - browser-session
      - meeting-urls
      - post-meeting-transcription
      - realtime-transcription
      - realtime-transcription/gmeet
      - realtime-transcription/msteams
      - webhooks
    max_duration_sec: 120

  # ── Test scripts — retrofitted with step_* in Phase A ───────────
  webhooks:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: tests/webhooks.sh
    features: [webhooks]
    max_duration_sec: 180
    steps:
      - config             # PUT /user/webhook stores config in User.data
      - inject             # gateway injects X-User-Webhook-* from validated token
      - spoof              # client-supplied headers stripped (anti-spoof)
      - envelope           # build_envelope emits frozen shape
      - no_leak_payload    # clean_meeting_data strips internal fields
      - hmac               # HMAC-SHA256 signing works
      - no_leak_response   # webhook_secret not in /bots/status response
      - e2e_completion     # meeting.completed delivered to user endpoint
      - e2e_status         # status-change webhooks fire when enabled

  containers:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: tests/containers.sh
    features: [bot-lifecycle, container-lifecycle]
    max_duration_sec: 180
    steps:
      - create
      - alive
      - removal
      - status_completed
      - timeout_stop
      - concurrency_slot
      - no_orphans

  dashboard-auth:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: tests/dashboard-auth.sh
    features: [dashboard]
    max_duration_sec: 30
    steps:
      - login
      - cookie_flags
      - identity
      - proxy_reachable

  dashboard-proxy:
    tier: cheap
    runs_in: [compose, helm]   # lite doesn't serve the full dashboard proxy
    script: tests/dashboard-proxy.sh
    features: [dashboard]
    max_duration_sec: 60
    steps:
      - meetings_list
      - pagination
      - field_contract
      - transcript_proxy
      - bot_create_proxy
      - no_false_failed

  # ── Test scripts still awaiting Phase D retrofit (listed so the runner
  #    knows they exist, but skipped until step_* reporting is added).
  #    Remove `awaiting_retrofit: true` once migrated.
  auth-meeting:
    tier: cheap
    runs_in: [compose, helm]
    script: tests/auth-meeting.sh
    features: [authenticated-meetings]
    awaiting_retrofit: true

  browser-session:
    tier: cheap
    runs_in: [compose, helm]
    script: tests/browser-session.sh
    features: [browser-session, remote-browser]
    awaiting_retrofit: true

  browser-login:
    tier: human   # Google login persistence — requires manual interaction
    runs_in: []
    script: tests/browser-login.sh
    features: [browser-session]

  bot-stop-timing:
    tier: meeting
    runs_in: []
    script: tests/bot-stop-timing.sh
    features: [bot-lifecycle]

  transcription-replay:
    tier: meeting
    runs_in: []
    script: tests/transcription-replay.sh
    features: [realtime-transcription]

  tts-reliability:
    tier: meeting
    runs_in: []
    script: tests/tts-reliability.sh
    features: [realtime-transcription, speaking-bot]

  meeting-tts:
    tier: meeting      # needs Google Meet + TTS + playwright on the runner
    runs_in: []
    script: tests/meeting-tts.sh
    features:
      - realtime-transcription
      - realtime-transcription/gmeet
      - meeting-chat
      - speaking-bot

  meeting-tts-teams:
    tier: meeting
    runs_in: []
    script: tests/meeting-tts-teams.sh
    features: [realtime-transcription/msteams]

  post-meeting:
    tier: meeting      # depends on meeting-tts having run first
    runs_in: []
    script: tests/post-meeting.sh
    features: [post-meeting-transcription, webhooks]

  collect:
    tier: human        # data collection, not validation
    runs_in: []
    script: tests/collect.sh
    features: []

  # ── 260421-prod-stabilize additions ────────────────────────────
  chart-prod-secrets-secretref:
    tier: cheap
    runs_in: [helm]
    script: tests/chart-prod-secrets-secretref.sh
    features: [security-hygiene]
    max_duration_sec: 60

  bot-records-incrementally:
    tier: cheap
    runs_in: [lite, compose]
    script: tests/bot-records-incrementally.sh
    features: [bot-lifecycle]
    max_duration_sec: 15

  recording-survives-sigkill:
    tier: cheap
    runs_in: [compose]
    script: tests/recording-survives-sigkill.sh
    features: [bot-lifecycle]
    max_duration_sec: 180

  package-tests:
    tier: cheap
    runs_in: [lite]
    script: tests/package-tests.sh
    features: [dashboard]
    max_duration_sec: 150

  chart-all-services-db-pool-tuned:
    tier: cheap
    runs_in: [helm]
    script: tests/chart-all-services-db-pool-tuned.sh
    features: [infrastructure]
    max_duration_sec: 20

  # v0.10.5.3 Pack H follow-up: chart-rolling-update-zero-surge entry was
  # superseded by chart-rolling-update-zero-downtime. The old check enforced
  # maxSurge: 0 (no DB-pool doubling during rolling), but Pack H intentionally
  # flipped to maxSurge: 1, maxUnavailable: 0 to fix the v0.10.5.2-class outage
  # (OLD pod killed before NEW Ready → 502s). v0.10.5 Pack C.x already shrunk
  # per-pod DB pool 4×, so 2× footprint during rolling is well under cap.
  # See registry.yaml HELM_ROLLING_UPDATE_ZERO_DOWNTIME for full rationale.
  chart-rolling-update-zero-downtime:
    tier: cheap
    runs_in: [helm]
    script: tests/chart-rolling-update-zero-downtime.sh
    features: [infrastructure]
    max_duration_sec: 20

  # v0.10.5.3 FM-274 regression guard. Three-layer defense for the bot
  # hallucination corpus (source files exist + .gitignore exception +
  # build-script fail-loud). See tests/v0.10.5.3-hallucination-corpus.sh
  # for the script, tests3/registry.yaml for HALLUCINATION_CORPUS_PRESENT
  # / _GITIGNORE_EXCEPTION / _BUILD_FAIL_LOUD entries, and
  # features/bot-lifecycle/dods.yaml for DoD bindings.
  v0.10.5.3-hallucination-corpus:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: tests/v0.10.5.3-hallucination-corpus.sh
    features: [bot-lifecycle]
    max_duration_sec: 5

  # ── v0.10.6 Pack U — audio recording unification ─────────────
  # Static checks that don't need a deployed bot. Verifies platform
  # recording.ts files are within LOC budget post-Pack-U, no bot-side
  # master construction remains, finalize_recording_master is invoked
  # from bot_exit_callback BEFORE update_meeting_status. See
  # tests/v0.10.6-static-greps.sh for the script body, tests3/registry.yaml
  # for PLATFORM_RECORDING_TS_LINE_BUDGET / NO_PER_PLATFORM_MASTER_CONSTRUCTION
  # / BOT_EXIT_CALLBACK_INVOKES_FINALIZER / FINALIZER_BEFORE_STATUS_FLIP entries,
  # and features/bot-lifecycle/dods.yaml + features/post-meeting-transcription/
  # dods.yaml for DoD bindings.
  v0.10.6-static-greps:
    tier: cheap
    runs_in: [lite, compose, helm]
    script: tests/v0.10.6-static-greps.sh
    features: [bot-lifecycle, post-meeting-transcription]
    max_duration_sec: 30
    steps:
      - platform_recording_line_budget
      - no_bot_master_construction
      - finalizer_invoked_in_exit_callback
      - finalizer_before_status

  # Runtime smokes for Pack U. Most steps require live test cluster +
  # fixture meeting URLs; skip cleanly when fixtures aren't set. The
  # download_presigned_master step has a real implementation that
  # validates against any completed recording in the test user's data.
  # See scope.yaml human_verify[] for operator-driven validation steps.
  v0.10.6-runtime-smokes:
    tier: meeting
    runs_in: [compose, helm]
    script: tests/v0.10.6-runtime-smokes.sh
    features: [bot-lifecycle, post-meeting-transcription, dashboard]
    max_duration_sec: 600
    steps:
      - finalizer_idempotency
      - master_at_storage_path
      - bot_kill_gmeet_master_playable
      - bot_kill_teams_master_playable
      - bot_kill_zoom_master_playable
      - deferred_transcribe_master
      - download_presigned_master

  chart-pgbouncer-optional:
    tier: cheap
    runs_in: [helm]
    script: tests/chart-pgbouncer-optional.sh
    features: [infrastructure]
    max_duration_sec: 30

  runtime-api-exit-callback-durable:
    tier: cheap
    runs_in: [lite, compose]
    script: tests/runtime-api-exit-callback-durable.sh
    features: [bot-lifecycle]
    max_duration_sec: 60

  # ── v0.10.5 Pack X — synthetic-rig scenarios ──────────────────
  # Drives OSS-side meeting-api lifecycle via direct callback POSTs
  # without depending on external platforms (Zoom DOM, Meet WebRTC,
  # Teams). Catches OSS-side regressions in callback handlers,
  # classifier logic, schema invariants, and idempotency contracts
  # — deterministically, in seconds. Companion to real-meeting
  # validation. Each scenario exits 0 pass / non-zero fail; runner
  # aggregates into a matrix-shaped JSON report.
  synthetic:
    tier: cheap
    runs_in: [lite, compose]
    script: synthetic/run-all.sh
    features: [bot-lifecycle, post-meeting-transcription]
    max_duration_sec: 240
