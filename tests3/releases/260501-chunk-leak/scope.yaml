# ── Pack D-3 — Audio playback streaming (DEFERRED to v0.10.5.4) ───────
# Status: DEFERRED. Dashboard inline-streaming feature (commit eddcabf)
# was reverted in commit a62d658 after empirical testing on LKE meeting 10
# uncovered a deeper recording-pipeline issue: every chunk uploaded to MinIO
# starts with bytes 0x43 0xB6 0x75 0x01 (mid-stream Cluster element) instead
# of the WebM/EBML root header 0x1A 0x45 0xDF 0xA3. None of the 72 chunks has
# a complete init segment, so even with a perfect presigned URL the browser
# cannot decode the audio (player hung at "Preparing audio..."). Pack D-3's
# URL strategy was orthogonally fine — it just couldn't surface anything
# playable until the recording finalizer is fixed.
#
# What stays in v0.10.5.3 (Option B server-side infra — KEPT):
# - meeting-api/storage.py: MINIO_PUBLIC_ENDPOINT for browser-reachable
#   presigned URLs (commit 5d06d69).
# - helm chart: NodePort support for MinIO Service (commit 5d06d69).
# - compose: MINIO_HOST_BIND env for opt-in external bind (commit 285b940).
# These are correct improvements with no behavior regression on their own;
# v0.10.5.4 will need them.
#
# Followup tracked for v0.10.5.4:
# (a) Recording finalizer produces a single concatenated master.webm with
#     valid EBML init segment.
# (b) media_files[].storage_path points to that master file.
# (c) Re-land dashboard inline streaming on top of (a) + (b).
- id: dashboard-audio-streams-from-bucket
  status: deferred
  deferred_to: v0.10.5.4
  source: gh-issue
  ref: Vexa-ai/vexa#288
  problem: |
    Dashboard audio playback downloads the full audio file before playback
    starts. Investigation in v0.10.5.3 revealed deeper issue: chunks have
    no WebM init segment so bytes are unplayable regardless of URL choice.
  hypothesis: |
    Original v0.10.5.3 attempt: presigned URL for direct browser fetch.
    REVERTED — surface bug runs deeper than URL strategy; needs finalizer
    to produce master.webm with init segment.
  fix_commits:
    - eddcabf  # original Pack D-3 dashboard impl
    - 5d06d69  # Option B server-side infra (KEPT)
    - 285b940  # Option B compose follow-up (KEPT)
    - a62d658  # revert dashboard impl, defer feature
  proves: []  # deferred; checks moved to v0.10.5.4
  required_modes: []
  human_verify: []

# ── Pack H — Helm chart hardening (promoted from DEFER) ───────────────
- id: helm-chart-hardening
  source: incident
  ref: ""  # post-mortem from 260501-followup emergency-bypass.md
  problem: |
    During v0.10.5.2 ship cycle, dashboard + webapp pods went 502 because:
    - replicaCount: 1 + default rolling-update killed OLD pod before NEW Ready
    - helm upgrade didn't use --atomic, so failed image-pull stayed broken
    - no pre-flight image-exists check before applying values
    Resolved manually with helm rollback + atomic redeploy, but a real
    customer-impact outage during what should have been a routine bump.
  hypothesis: |
    Three small changes:
    H.1: deploy/helm/charts/vexa/templates/{dashboard,webapp,mcp,api-gateway}-
         deployment.yaml — strategy: rollingUpdate { maxUnavailable: 0,
         maxSurge: 1 }. Old pod stays up until new is Ready.
    H.2: deploy/helm/charts/vexa/values.yaml — replicaCount: 2 default for
         stateless services. PodDisruptionBudget minAvailable: 1.
    H.3: Makefile new target `release-helm-upgrade-safe` that:
         (a) renders chart values
         (b) greps every `image:` reference + verifies via docker manifest inspect
         (c) fails fast if any image is missing
         (d) calls helm upgrade --atomic --wait --timeout 5m
  fix_commits: []
  proves:
    - {check: HELM_DEPLOYMENT_MAX_UNAVAILABLE_ZERO, modes: [helm]}
    - {check: HELM_REPLICA_COUNT_TWO_FOR_STATELESS, modes: [helm]}
    - {check: HELM_UPGRADE_PREFLIGHT_IMAGE_CHECK, modes: [helm]}
    - {check: HELM_UPGRADE_ATOMIC_DEFAULT, modes: [helm]}
  required_modes: [helm]
  human_verify:
    - mode: helm
      do: "Set values-test.yaml dashboard.image.tag to a known-bad tag (e.g. :nonexistent). Run release-helm-upgrade-safe."
      expect: "Make target fails BEFORE applying helm; output names the missing image. No pods churn."
    - mode: helm
      do: "Run release-helm-upgrade-safe with valid tags; mid-upgrade, watch pod state."
      expect: "Old pod stays Ready until new pod reaches Ready (zero unavailable replicas at any sample point)."

# ── End of scope ──────────────────────────────────────────────────────
