# ── Pack FM-274 — Hallucinations corpus regression guard ──────────────
# Detected during this release's audit (informal, scaffolded for v0.10.6).
# Bot ships with empty whisper-hallucination filter since v0.10.0 (when
# WhisperLive was removed and the corpus went with it). Long-form
# hallucinations like "thanks for watching" / "subscribe to my channel"
# leaked into prod transcripts for ~3 months. Three-layer fix:
#   (1) restore corpus files (commit 3d9b0d1)
#   (2) .gitignore exception so they can't silently re-disappear
#   (3) build script `&&` (fail-loud) instead of `2>/dev/null;` (silent-fail)
# This pack registers the regression-guard test in scope so the matrix
# runs it across all 3 modes — not just compose where stale .state was.
- id: hallucinations-corpus-restored
  source: cycle-internal
  ref: ""  # FM-274 pre-existing
  problem: |
    Bot hallucination corpus (services/vexa-bot/core/src/services/
    hallucinations/{en,es,pt,ru}.txt) was deleted with WhisperLive in
    v0.10.0 (commit e55e878) and never re-located to the bot codebase.
    Bot images shipped with empty filter; whisper hallucinations leaked
    into prod transcripts. FM-274 detected by static check at locks/
    but check was orphan (not bound to any DoD), so the regression went
    to prod for ~3 months.
  hypothesis: |
    Three-layer fix: (1) restore phrase files at the new canonical bot
    path; (2) .gitignore negation rule so global *.txt can't silently
    drop them; (3) core/package.json build script uses `&&` instead of
    `2>/dev/null;` so future cp failures abort build. Bind all three to
    a registry test that runs in every mode.
  fix_commits:
    - 3d9b0d1  # restore phrase files + .gitignore exception + fail-loud build
    - a320867  # registry checks + bot-lifecycle DoD bindings
  proves:
    - {test: v0.10.5.3-hallucination-corpus, modes: [lite, compose, helm]}
  required_modes: [lite, compose, helm]
  human_verify:
    - mode: compose
      do: "After release-deploy, ssh root@$COMPOSE_VM_IP, run `docker exec vexa-bot-1 ls /app/vexa-bot/core/dist/services/hallucinations/`. Should list en.txt, es.txt, pt.txt, ru.txt."
      expect: "All 4 files present in the runtime image."

# ── Pack H — Helm chart hardening (promoted from DEFER) ───────────────
- id: helm-chart-hardening
  source: incident
  ref: ""  # post-mortem from 260501-followup emergency-bypass.md
  problem: |
    During v0.10.5.2 ship cycle, dashboard + webapp pods went 502 because:
    - replicaCount: 1 + default rolling-update killed OLD pod before NEW Ready
    - helm upgrade didn't use --atomic, so failed image-pull stayed broken
    - no pre-flight image-exists check before applying values
    Resolved manually with helm rollback + atomic redeploy, but a real
    customer-impact outage during what should have been a routine bump.
  hypothesis: |
    Three small changes:
    H.1: deploy/helm/charts/vexa/templates/{dashboard,webapp,mcp,api-gateway}-
         deployment.yaml — strategy: rollingUpdate { maxUnavailable: 0,
         maxSurge: 1 }. Old pod stays up until new is Ready.
    H.2: deploy/helm/charts/vexa/values.yaml — replicaCount: 2 default for
         stateless services. PodDisruptionBudget minAvailable: 1.
    H.3: Makefile new target `release-helm-upgrade-safe` that:
         (a) renders chart values
         (b) greps every `image:` reference + verifies via docker manifest inspect
         (c) fails fast if any image is missing
         (d) calls helm upgrade --atomic --wait --timeout 5m
  fix_commits: []
  proves:
    - {check: HELM_DEPLOYMENT_MAX_UNAVAILABLE_ZERO, modes: [helm]}
    - {check: HELM_REPLICA_COUNT_TWO_FOR_STATELESS, modes: [helm]}
    - {check: HELM_UPGRADE_PREFLIGHT_IMAGE_CHECK, modes: [helm]}
    - {check: HELM_UPGRADE_ATOMIC_DEFAULT, modes: [helm]}
  required_modes: [helm]
  human_verify:
    - mode: helm
      do: "Set values-test.yaml dashboard.image.tag to a known-bad tag (e.g. :nonexistent). Run release-helm-upgrade-safe."
      expect: "Make target fails BEFORE applying helm; output names the missing image. No pods churn."
    - mode: helm
      do: "Run release-helm-upgrade-safe with valid tags; mid-upgrade, watch pod state."
      expect: "Old pod stays Ready until new pod reaches Ready (zero unavailable replicas at any sample point)."

# ──────────────────────────────────────────────────────────────────────
# ── Pack U — Audio recording unification + server-side master concat ──
# ──────────────────────────────────────────────────────────────────────
#
# Lead bug for this pack (CRITICAL, project-owner-found at human-gate):
# downloaded recordings are ~270KB unplayable fragments. Root-cause
# traced 100%: Pack M's chunk-buffer cap (commit 43881da) shrank the
# buffer that bot-side master construction relies on at graceful-leave.
# Master uploads as a tail fragment and overwrites chunk_seq=0 (which
# originally held the EBML init segment). See triage-log.md FOURTH-PASS.
#
# Pack U is the structural fix:
#   1. Move master construction off the bot, onto meeting-api's existing
#      bot_exit_callback handler (which already reconciles meeting state
#      from active → completed/failed for both graceful and crashed bots
#      via runtime-api's idle_loop reaper).
#   2. Unify the bot-side capture pipeline so all 3 platforms emit chunks
#      via one shared module — eliminates ~2300 LOC of duplication
#      between googlemeet/recording.ts (1003) + msteams/recording.ts (1490).
#   3. Bring Zoom Web onto the chunked-upload model (today its parecord
#      pipeline writes a single growing WAV to bot-pod local disk; if the
#      bot crashes, all audio is lost — see GH #296).
#
# MIN constraint (project-owner directive 2026-05-02):
#   Recording must be playable/downloadable in any case of bot crash —
#   must not rely on bot lifecycle.
# MAX constraint:
#   Playback on site without full-file pre-download (browser streams
#   from MinIO with HTTP Range support — pairs with Pack D-3 above).

- id: bot-audio-pipeline-unified
  source: gh-issue
  ref: Vexa-ai/vexa#296
  problem: |
    services/vexa-bot/core/src/platforms/googlemeet/recording.ts (1003 LOC)
    and msteams/recording.ts (1490 LOC) duplicate ~80% of their content:
    MediaRecorder injection + mimeType selection + chunk buffer + cap-and-
    splice logic + shutdown-flush sequence + per-chunk upload error
    handling. Differences are platform-specific selectors + log prefixes +
    sessionUid prefix. Every fix in this layer must be applied twice;
    Pack M's chunk-buffer cap diverges between platforms in subtle ways.

    Zoom Web (services/vexa-bot/core/src/platforms/zoom/web/recording.ts,
    225 LOC) uses parecord (Node subprocess) — a different paradigm
    entirely. Its WAV file grows on bot-pod local disk and is uploaded
    only at meeting-end via recordingService.upload(). If the bot crashes
    mid-meeting, ALL audio is lost (the file never made it to the bucket).
  hypothesis: |
    Introduce a shared services/audio-pipeline.ts (Node-side module) with:
      - AudioChunk type: { format: 'webm'|'wav', data: Buffer, seq: number,
                            is_final: boolean, mimeType?: string }
      - AudioCaptureSource interface with start()/stop() + chunk events
      - UnifiedRecordingPipeline class that drives capture lifecycle,
        forwards chunks to RecordingService.uploadChunk(), handles
        shutdown-final-chunk semantics
      - MediaRecorderCapture impl (used by GMeet + Teams; takes a Page
        + selectors as constructor args)
      - PulseAudioCapture impl (used by Zoom Web; wraps parecord, slices
        the PCM stream into 15s WAV chunks for periodic upload)
    Per-platform recording.ts shrinks to ~150 LOC: instantiate the
    capture source, pass the pipeline its config, hand off; selectors
    + popup dismissal + speaker detection stay platform-local.
  fix_commits: []
  proves:
    - {check: SHARED_AUDIO_PIPELINE_MODULE_EXISTS, modes: [lite, compose, helm]}
    - {check: GMEET_RECORDING_USES_SHARED_PIPELINE, modes: [lite, compose, helm]}
    - {check: TEAMS_RECORDING_USES_SHARED_PIPELINE, modes: [lite, compose, helm]}
    - {check: ZOOM_WEB_RECORDING_USES_SHARED_PIPELINE, modes: [lite, compose, helm]}
    - {check: ZOOM_WEB_UPLOADS_CHUNKS_PERIODICALLY, modes: [lite, compose, helm]}
    - {check: PLATFORM_RECORDING_TS_LINE_BUDGET, modes: [lite]}  # static LOC budget per file
    - {check: NO_PER_PLATFORM_MASTER_CONSTRUCTION, modes: [lite]}  # __vexaSaveRecordingBlob removed
  required_modes: [lite, compose, helm]
  human_verify:
    - mode: compose
      do: "Run a 5-min GMeet recording. Tail bot stdout. Confirm chunks upload via the shared pipeline log lines (single set of [audio-pipeline] tags, not [Google Recording] / [Teams Recording] divergent prefixes)."
      expect: "Chunks 0..N visible; all uploads via the unified path; no platform-specific master-construction code path triggers."

- id: server-side-master-finalizer
  source: cycle-internal
  ref: ""  # new GH issue to file under v0.10.6
  problem: |
    Bot-side master construction is fundamentally fragile: depends on
    graceful-leave firing (so SIGKILL'd bots produce no master); duplicates
    across 3 platforms with subtly divergent buffer management; broken by
    Pack M's chunk-buffer cap. The post-meeting transcribe pipeline
    (/meetings/{id}/transcribe) reads media_file.storage_path which today
    points at whichever bot-side artifact ended up at chunk_seq=0 (master
    if graceful, last chunk if crashed). Either way, broken.
  hypothesis: |
    Add services/meeting-api/meeting_api/recording_finalizer.py:
      async def finalize_recording_master(meeting_id, db) -> None:
          # 1. List recording chunks under recordings/<user>/<storage_id>/
          #    <session>/audio/0*.{webm|wav} via storage list API.
          # 2. Idempotency check: if master.{webm|wav} already exists +
          #    media_file.master_ready=true, return.
          # 3. Detect format from first chunk; dispatch:
          #    - WebM: byte-concat (chunk 0 has init segment, 1+ are
          #      Cluster-only — direct concat is valid container)
          #    - WAV: RIFF-aware merge (sum data chunk sizes; rewrite
          #      master RIFF + fmt + data headers)
          # 4. Stream-upload master.{format} to bucket.
          # 5. Update media_file.storage_path → master path; flip
          #    media_file.master_ready=true.
    Hook synchronously into bot_exit_callback BEFORE update_meeting_status:
      await finalize_recording_master(meeting.id, db)   # blocks ~1-3s
      success = await update_meeting_status(meeting, target_status, ...)
    If finalizer raises (MinIO transient down) → callback returns non-2xx
    → runtime-api's existing idle_loop retries durably (DoD already exists:
    runtime-api-idle-loop-sweeps-pending-callbacks). No new sweeper service.
    Synchronous-before-status-flip ensures /meetings/{id}/transcribe never
    sees a stale storage_path for a meeting it considers terminal.
  fix_commits: []
  proves:
    - {check: SERVER_SIDE_MASTER_FINALIZER_EXISTS, modes: [lite, compose, helm]}
    - {check: BOT_EXIT_CALLBACK_INVOKES_FINALIZER, modes: [lite]}  # static
    - {check: FINALIZER_IS_IDEMPOTENT, modes: [compose]}  # repeat invocation safe
    - {check: MASTER_AT_STORAGE_PATH, modes: [compose, helm]}  # post-meeting
    - {check: BOT_KILL_RECORDING_PLAYABLE_GMEET, modes: [compose, helm]}
    - {check: BOT_KILL_RECORDING_PLAYABLE_TEAMS, modes: [compose, helm]}
    - {check: BOT_KILL_RECORDING_PLAYABLE_ZOOM, modes: [compose]}  # parecord chunked depends on Pack U.4
    - {check: DEFERRED_TRANSCRIBE_USES_MASTER, modes: [compose, helm]}
    - {check: FINALIZER_BEFORE_STATUS_FLIP, modes: [lite]}  # static order check
  required_modes: [lite, compose, helm]
  human_verify:
    - mode: helm
      do: "Run a 10-min GMeet recording. SIGKILL the bot pod at minute 5 via `kubectl delete pod --grace-period=0`. Wait 60s for idle_loop to detect + fire callback. Then GET /recordings/{id}/media/{file_id}/raw."
      expect: "Bytes downloaded are a complete master WebM (ffprobe duration ≥4 minutes). Pre-Pack-U this case returned an empty / unplayable fragment."
    - mode: compose
      do: "After a normal completed meeting, manually re-fire bot_exit_callback (curl with X-Pack-X-Test if env-gated) — finalizer should be idempotent."
      expect: "Second invocation logs 'master already exists, skipping'; storage_path unchanged; no duplicate writes."

# ── #304 — Dashboard /meetings list duplicate rows ────────────────────
- id: dashboard-meetings-pagination-duplicates
  source: gh-issue
  ref: Vexa-ai/vexa#304
  problem: |
    Dashboard /meetings page shows duplicate rows (3-6× per meeting) when
    redacted shells (`data.redacted=true` or `platform_specific_id==null`
    rows from the DELETE-with-PII-scrub flow) are present in the user's
    history. Backend has exactly one row per native_meeting_id; the
    dashboard's pagination math is wrong.
  hypothesis: |
    services/dashboard/src/stores/meetings-store.ts:131 passes
    `offset: meetings.length` to the next page request, where `meetings`
    is the post-filter array (after isHiddenDeletedMeeting drops
    redacted shells). Each filtered shell makes the next request ask
    for an offset N positions earlier than where the previous page
    actually ended → API returns N rows already shown.

    Fix: track an explicit `_offset` in the store that advances by the
    unfiltered API page size (50), not by `meetings.length`. Plus dedupe
    the merged list by meeting.id on each fetchMoreMeetings call as
    belt-and-suspenders against any future filter / WS-update race.
  fix_commits: []
  proves:
    - {check: DASHBOARD_MEETINGS_PAGINATION_TRACKS_UNFILTERED_OFFSET, modes: [lite, compose, helm]}
  required_modes: [lite, compose, helm]
  human_verify:
    - mode: helm
      do: "Open dashboard /meetings on an account with redacted-shell history (or generate via DELETE /meetings/{platform}/{native_meeting_id} on a few finalized meetings, then refresh). Scroll the list."
      expect: "No duplicate rows. Each meeting appears at most once regardless of how many redacted shells exist in the user's history."

