  source: gh-issue
  ref: Vexa-ai/vexa#265
  problem: |
    Dashboard meeting list renders timestamps in UTC, not the viewing user's
    local timezone. Industry-standard is local-tz with UTC tooltip on hover.
  hypothesis: |
    services/dashboard/src/components/meeting-row.tsx (or wherever time
    rendering lives) — switch from toISOString() to toLocaleString() with
    browser-detected Intl.DateTimeFormat().resolvedOptions().timeZone.
    Add UTC as title attribute for hover tooltip. ~10-line change.
  fix_commits: []
  proves:
    - {check: DASHBOARD_RENDERS_LOCAL_TZ, modes: [lite, compose, helm]}
  required_modes: [lite, compose, helm]
  human_verify:
