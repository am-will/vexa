# ── REGISTRY CHANGES ──────────────────────────────────────────────────
# Every scope proves[] binding must exist in registry.yaml OR below.
# Existing registry dependencies (no new entry needed):
#   DB_POOL_NO_EXHAUSTION — reused by Pack D.3 dynamic regression

registry_changes_approved:

  # Pack A
  - id: HELM_PROD_SECRETS_SECRETREF_ONLY
    type: script
    script: tests/chart-prod-secrets-secretref.sh
    step: secretref_only
    modes: [helm]
    state: stateless
    mutates: []
    max_duration_sec: 20
    rationale: |
      Runs `helm template` on the chart with default values and greps
      every rendered Deployment for the four prod-critical env names
      (DB_PASSWORD, TRANSCRIPTION_SERVICE_TOKEN, JWT_SECRET,
      NEXTAUTH_SECRET). Each must appear ONLY as `valueFrom.secretKeyRef`
      — never as plain `value:`. Fail if any appears as plain value.
    approved: true

  - id: HELM_PROD_SECRETS_REQUIRED_AT_RENDER
    type: script
    script: tests/chart-prod-secrets-secretref.sh
    step: required_at_render
    modes: [helm]
    state: stateless
    mutates: []
    max_duration_sec: 30
    rationale: |
      Renders the chart four times, each with one of the four prod
      secrets absent from values. Every render must exit non-zero with
      an error matching `required`. Regression guard for the
      2026-04-21 outage class (incident-doc §13). Bundled with the
      sister check into one shell script with `step:` sub-invocations,
      matching the existing `tests/security-hygiene.sh` pattern.
    approved: true

  # Pack B
  - id: RECORDING_UPLOAD_SUPPORTS_CHUNK_SEQ
    type: grep
    file: services/meeting-api/meeting_api/recordings.py
    must_match: 'chunk_seq\s*:\s*int'
    modes: [lite, compose]
    state: stateless
    max_duration_sec: 5
    rationale: |
      Static grep: the /internal/recordings/upload endpoint signature
      declares a `chunk_seq: int` form parameter. Catches a refactor
      that silently drops chunk support.
    approved: true

  - id: BOT_RECORDS_INCREMENTALLY
    type: script
    script: tests/bot-records-incrementally.sh
    modes: [lite, compose]
    state: stateless
    mutates: []
    max_duration_sec: 10
    rationale: |
      Greps services/vexa-bot/core/src/platforms/{googlemeet,msteams}/
      recording.ts for two conditions: (1) `MediaRecorder.start(` with
      a timeslice argument ≥ 5000 (not 1000, not undefined); (2) the
      `ondataavailable` handler contains a direct POST / fetch /
      upload call (not just `.push(` into a window-global buffer).
      Script so the logic is readable and future platforms (Zoom) can
      be enumerated without editing registry.yaml.
    approved: true

  - id: RECORDING_SURVIVES_MID_MEETING_KILL
    type: script
    script: tests/recording-survives-sigkill.sh
    modes: [compose]
    state: stateful
    mutates: ["minio:recordings/test-user/**", "meetings(test)"]
    max_duration_sec: 120
    rationale: |
      Compose-mode chaos test: start a test bot against a fixture
      meeting URL, record for ~90 s (expect 3 chunks), SIGKILL the
      bot container mid-third-chunk, wait 10 s, query MinIO under
      `recordings/<test-user>/<id>/<session>/` — assert at least
      2 chunks present (the first two complete 30-s chunks). Also
      query DB for the Recording row — assert status=IN_PROGRESS
      (never COMPLETED; no final chunk arrived). Dynamic proof that
      the incremental-upload model survives ungraceful shutdown.
    approved: true

  - id: RUNTIME_API_STOP_GRACE_MATCHES_POD_SPEC
    type: grep
    file: services/runtime-api/runtime_api/backends/kubernetes.py
    must_match: 'timeout:\s*int\s*=\s*3[0-9]|timeout:\s*int\s*=\s*[4-9][0-9]|timeout:\s*int\s*=\s*[1-9][0-9]{2,}'
    modes: [helm]
    state: stateless
    max_duration_sec: 5
    rationale: |
      Grace-period default in kubernetes.py `stop()` must be ≥ 30
      (matching the pod spec's terminationGracePeriodSeconds).
      Regex permits 30-99 or any 3+ digit number. Defense-in-depth
      alongside incremental upload — the final chunk still needs time
      to flush on graceful shutdown.
    approved: true

  # Pack C
  - id: TRANSCRIPT_RENDERING_DEDUP_TESTS_PASS
    type: script
    script: tests/package-tests.sh
    step: transcript_rendering
    modes: [lite]
    state: stateless
    mutates: []
    max_duration_sec: 120
    rationale: |
      Runs `npm ci && npm test` in packages/transcript-rendering.
      Covers the new dedup-prefers-confirmed regression + existing
      76 tests. Script uses node_modules cache so subsequent runs are
      fast. Mode-independent; lite is cheapest canonical mode.
    approved: true

  - id: PACKAGES_CI_WORKFLOW_EXISTS
    type: grep
    file: .github/workflows/test-packages.yml
    must_match: 'packages/[a-z*-]+|matrix:'
    modes: [lite]
    state: stateless
    max_duration_sec: 5
    rationale: |
      Static existence-and-shape check: the packages CI workflow file
      exists and either names a specific package path or uses a matrix
      strategy covering packages/*. Cheap way to prevent the workflow
      from being accidentally deleted.
    approved: true

  # Pack D
  - id: ENGINE_POOL_RESET_ON_RETURN_ROLLBACK
    type: grep
    file: services/meeting-api/meeting_api/database.py
    must_match: 'pool_reset_on_return\s*=\s*["'']rollback["'']'
    modes: [lite, compose]
    state: stateless
    max_duration_sec: 5
    rationale: |
      The defense against per-session transaction leaks is an engine
      configuration flag that's easy to lose in a refactor. This grep
      makes the defense explicit in the check surface even though it
      stays implicit in request-handler code. Flips red immediately
      if anyone rewrites database.py without preserving the flag.
    approved: true

  - id: HELM_ALL_SERVICES_DB_POOL_TUNED
    type: script
    script: tests/chart-all-services-db-pool-tuned.sh
    modes: [helm]
    state: stateless
    mutates: []
    max_duration_sec: 15
    rationale: |
      Enumerates every service Deployment template in
      deploy/helm/charts/vexa/templates/ that declares SQLAlchemy /
      asyncpg / Prisma DB usage (admin-api, api-gateway, meeting-api,
      runtime-api, plus any siblings the chart grows). For each,
      asserts an explicit DB_POOL_SIZE env (and DB_MAX_OVERFLOW where
      applicable). Retires HELM_MEETING_API_DB_POOL_TUNED (which
      remains in registry.yaml unbound — no DoD points at it anymore).
    approved: true

  # Pack G
  - id: HELM_DEPLOYMENT_STRATEGY_HELPER_DEFINED
    type: grep
    file: deploy/helm/charts/vexa/templates/_helpers.tpl
    must_match: 'define\s+"vexa\.deploymentStrategy"'
    modes: [helm]
    state: stateless
    max_duration_sec: 5
    rationale: |
      Asserts the `vexa.deploymentStrategy` helper is defined.
      Pairs with HELM_ROLLING_UPDATE_ZERO_SURGE (behavioural) —
      both together prove the helper exists AND is applied.
    approved: true

  - id: HELM_ROLLING_UPDATE_ZERO_SURGE
    type: script
    script: tests/chart-rolling-update-zero-surge.sh
    modes: [helm]
    state: stateless
    mutates: []
    max_duration_sec: 15
    rationale: |
      Runs `helm template` on the chart with default values and parses
      every rendered `kind: Deployment`. Each must have
      `.spec.strategy.rollingUpdate.maxSurge` set to 0 or "0%".
      Fails on any Deployment missing the setting or with a non-zero
      maxSurge. Regression guard for the rolling-update pool-doubling
      risk (incident-doc §10).
    approved: true

  - id: HELM_API_GATEWAY_REPLICA_COUNT_HA
    type: grep
    file: deploy/helm/charts/vexa/values.yaml
    must_match: 'apiGateway:\s*\n(?:[ \t]+[^\n]+\n)*[ \t]+replicaCount:\s*[2-9]'
    modes: [helm]
    state: stateless
    max_duration_sec: 5
    rationale: |
      apiGateway.replicaCount default must be ≥ 2 so `maxSurge: 0`
      rolling updates remain zero-downtime. Regex uses `replicaCount`
      (camelCase — the real chart key, not `replicas`) and allows
      2-9 or larger.
    approved: true

  # Pack H
  - id: HELM_PGBOUNCER_OPTIONAL_AND_WIRED
    type: script
    script: tests/chart-pgbouncer-optional.sh
    modes: [helm]
    state: stateless
    mutates: []
    max_duration_sec: 30
    rationale: |
      Two sub-renders:
      (a) Default render (`pgbouncer.enabled: false` inherited):
          no `kind: Deployment` named `pgbouncer`; every service's
          DB_HOST env value routes to the postgres service (when
          postgres.enabled=true) or to `.Values.database.host` (when
          postgres.enabled=false). Unchanged from today.
      (b) `--set pgbouncer.enabled=true`: Deployment + Service for
          pgbouncer exist; every service's DB_HOST env renders to the
          pgbouncer Service name (via `vexa.dbHostEffective` helper).
      Asserts both renders. Regression guard for the toggle + wiring
      contract.
    approved: true

  # Pack J
  - id: RUNTIME_API_IDLE_LOOP_SWEEPS_PENDING_CALLBACKS
    type: grep
    file: services/runtime-api/runtime_api/lifecycle.py
    must_match: 'idle_loop.*pending_callback|list_pending_callbacks|pending_callback.*idle_loop'
    multiline: true
    modes: [lite, compose]
    state: stateless
    max_duration_sec: 5
    rationale: |
      Static grep verifying the idle_loop in lifecycle.py references
      pending-callback iteration (i.e. the sweep is wired). Multiline
      regex accommodates either ordering (sweep-code inside idle_loop
      body OR idle_loop calling a named helper that handles it).
    approved: true

  - id: RUNTIME_API_EXIT_CALLBACK_DURABLE
    type: script
    script: tests/runtime-api-exit-callback-durable.sh
    modes: [compose]
    state: stateful
    mutates: ["meeting(fixture)", "runtime-api:redis:pending_callbacks/*"]
    max_duration_sec: 180
    rationale: |
      Compose-mode chaos test:
      1. Create a test bot against a fixture meeting URL.
      2. Wait until bot is `active`.
      3. SIGSTOP meeting-api container (or network-blackhole it).
      4. `DELETE /bots/<id>` — runtime-api's exit callback will fail
         delivery N times.
      5. Wait 2× IDLE_CHECK_INTERVAL.
      6. SIGCONT meeting-api.
      7. Poll meeting status for up to another IDLE_CHECK_INTERVAL +
         CALLBACK_BACKOFF window.
      8. Assert meeting.status has transitioned out of `active` to
         `completed` or `failed` WITHOUT any manual intervention.
      Dynamic proof that the exit-callback delivery path is durable
      across meeting-api outages — the root-cause class for the
      7+ orphaned `active` meetings in incident-doc §7.
    approved: true
