# Plan approval — 260421-prod-stabilize
#
# Human signed off 2026-04-21. All items flipped to `approved: true`
# per explicit user turn: "approved" following the Iteration-3
# architecture-conformance audit presentation.

release_id: 260421-prod-stabilize
approved_at: 2026-04-21T10:55:00Z
approver: dmitry@vexa.ai
approval_source: |
  User turn "approved" 2026-04-21 after three groom iterations:
    Iter-1: initial pack shape (A, B-grace, C, D-rollback, G).
    Iter-2: Pack B re-scoped to incremental upload per user
            "grace-period is not a solution"; Pack H added after
            user "PgBouncer — isn't this an OSS side of separation
            of concerns?"; Pack J redesigned (no CronJob — reuse
            existing idle_loop).
    Iter-3: architecture-conformance audit reshaped Packs A / B / D,
            fixed Pack G regex drift, confirmed Pack H monolithic-
            chart pattern. Pack D scope reduced after finding
            engine-level `pool_reset_on_return="rollback"` already
            in place (#208's proposed fix is redundant). Pack B.3
            reconciler dropped (existing `Recording.status=IN_PROGRESS`
            already signals partial).
  Final shape presented and approved: Packs A, B, C, D, G, H, J
  (seven issues). Net cycle ~5 days develop.

# ── OBJECTIVES ────────────────────────────────────────────────────────

scope_approved:
  - issue: chart-every-prod-secret-via-secretkeyref
    hypothesis: true          # Extend existing admin-token Secret pattern; `required` fail-loud idiom from _helpers.tpl; no new Secret
    proves: true              # Two script checks: one asserts every prod-secret env in rendered chart uses secretKeyRef; one asserts `helm template` fails on missing secret
    required_modes: true      # [helm] — chart contract, helm is the canonical mode for chart-hygiene DoDs
    human_verify: true        # Both render-fail tests + grep of rendered Deployment YAML

  - issue: bot-recording-incremental-chunk-upload
    hypothesis: true          # Extend existing /internal/recordings/upload endpoint with chunk_seq; bot-side MediaRecorder timeslice change; defense-in-depth grace-period bump (30 s, not 90)
    proves: true              # Static greps (bot code emits chunks; endpoint accepts chunk_seq) + dynamic chaos test (SIGKILL mid-record; early chunks survive) + grace-period static check
    required_modes: true      # [compose] for chaos test, [helm] for grace-period inspection, [lite, compose] for bot-code static grep
    human_verify: true        # Long-meeting graceful test + compose-mode SIGKILL test

  - issue: transcript-rendering-dedup-prefers-confirmed-on-containment
    hypothesis: true          # In-tree 7-line fix + 2 test cases already drafted; npm version 0.4.1; sync dashboard lock; first packages/* CI workflow
    proves: true              # Two script checks: package tests pass + CI workflow file exists
    required_modes: true      # [lite] — mode-independent npm test; cheapest canonical mode
    human_verify: true        # Live-dashboard eyeroll on next live meeting

  - issue: engine-pool-reset-on-return-guarded
    hypothesis: true          # Lock in existing engine config via regression grep; broaden existing HELM_MEETING_API_DB_POOL_TUNED to all services; reuse existing DB_POOL_NO_EXHAUSTION dynamic check
    proves: true              # Three bindings: static grep of database.py engine config + static grep of chart values across services + existing dynamic check
    required_modes: true      # [lite, compose, helm] — engine grep everywhere; chart grep helm; dynamic compose
    human_verify: true        # Curl-burst + pg_stat_activity observation

  - issue: chart-rolling-update-zero-pool-overlap
    hypothesis: true          # Add vexa.deploymentStrategy helper; inject into every subchart Deployment; bump apiGateway.replicaCount default 1→2
    proves: true              # Three static checks: helper defined + strategy present on rendered Deployments + apiGateway.replicaCount ≥ 2
    required_modes: true      # [helm]
    human_verify: true        # kubectl get rs -w during an upgrade
    gap_analysis: true        # "No existing DoD inspects rollout strategy" — accurate
    new_checks: true          # Three new checks listed: helper/surge/replicas

  - issue: pgbouncer-as-optional-oss-chart-component
    hypothesis: true          # Monolithic-chart pattern mirroring postgres/redis/minio; new vexa.dbHostEffective helper; enabled: false default; every service's DB_HOST uses the helper
    proves: true              # Combined script check: chart renders without pgbouncer by default; renders with pgbouncer + wires DB_HOST when enabled
    required_modes: true      # [helm]
    human_verify: true        # Render-both-ways + grep DB_HOST in rendered Deployments
    gap_analysis: true        # "No existing DoD inspects chart topology for optional poolers" — accurate
    new_checks: true          # One new combined check

  - issue: runtime-api-exit-callback-delivery-is-durable
    hypothesis: true          # Remove retry cap in _deliver_callback; extend existing idle_loop to sweep pending callbacks; audit meeting-api callback-endpoint idempotency
    proves: true              # Static grep (idle_loop sweeps pending_callbacks) + dynamic chaos test (blackhole meeting-api; bot stops; restore; assert meeting transitions)
    required_modes: true      # [compose] for chaos test; [lite, compose] for static grep
    human_verify: true        # SIGSTOP + stop-bot + SIGCONT sequence
    gap_analysis: true        # "No existing DoD inspects exit-callback delivery durability" — accurate; #173's dual failure mode explicitly deferred
    new_checks: true          # Two new checks: durability + idle_loop sweep

