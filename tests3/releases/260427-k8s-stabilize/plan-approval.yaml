registry_changes_approved:

  # ── Pack A: Helm chart shape ──
  - id: HELM_TOLERATIONS_PROPAGATED
    type: script
    script: tests/chart-tolerations-propagated.sh
    modes: [helm]
    state: stateless
    max_duration_sec: 30
    rationale: |
      Render the chart with `--set global.tolerations='[{key: workload, operator: Equal, value: bot, effect: NoSchedule}]'`;
      assert every `kind: Deployment | StatefulSet | Job` template
      includes a matching tolerations block. Specifically catches
      the 0.10.4 regression where deployment-redis.yaml,
      deployment-pgbouncer.yaml, job-migrations.yaml dropped the
      `{{- with .Values.global.tolerations }}` blocks.
    approved: true

  - id: HELM_UPGRADE_TWICE_NO_JOB_IMMUTABLE
    type: script
    script: tests/chart-upgrade-twice-no-immutable.sh
    modes: [helm]
    state: stateful
    mutates: [release, jobs]
    max_duration_sec: 180
    rationale: |
      `helm install` then `helm upgrade --set meetingApi.image.tag=<bumped>`;
      assert the upgrade succeeds; zero `Job spec immutable` errors.
      Validates A.2 (migrations Job becomes Helm hook) regression.
    approved: true

  - id: HELM_FRESH_INSTALL_BUCKETS_PRESENT
    type: script
    script: tests/chart-minio-init-buckets-present.sh
    modes: [helm]
    state: stateful
    mutates: [minio-pvc]
    max_duration_sec: 180
    rationale: |
      Fresh `helm install` on a cluster with intentionally-delayed
      MinIO PVC provisioning; wait for Job completion; assert
      `mc ls vexa/` shows expected buckets. Closes A.3 minio-init
      Job racing MinIO startup.
    approved: true

  - id: HELM_CAPACITY_RESERVE_ZERO
    type: grep
    file: deploy/helm/charts/vexa/templates/deployment-capacity-reserve.yaml
    must_match: 'hasKey \.Values\.capacityReserve "replicas"'
    modes: [helm]
    state: stateless
    max_duration_sec: 5
    rationale: |
      Static grep asserting the capacityReserve template uses an
      explicit `hasKey` check rather than the falsy-zero `default 3`
      pattern. Closes A.4.
    approved: true

  - id: HELM_NETWORK_POLICY_TX_GATEWAY
    type: grep
    file: deploy/helm/charts/vexa/templates/networkpolicy.yaml
    must_match: 'allow-meeting-api[\s\S]*transcription-gateway'
    multiline: true
    modes: [helm]
    state: stateless
    max_duration_sec: 5
    rationale: |
      Static grep asserting allow-meeting-api NetworkPolicy includes
      a transcription-gateway egress target. Closes A.5.
    approved: true

  - id: HELM_NO_HARDCODED_RELEASE_NAME
    type: script
    script: tests/chart-no-hardcoded-release-name.sh
    modes: [helm]
    state: stateless
    max_duration_sec: 30
    rationale: |
      Render chart with non-default release name (`helm template vexa-prod ...`);
      grep rendered output for `vexa-platform-vexa-` strings outside
      `_helpers.tpl`. Should be zero hits. Closes A.6.
    approved: true

  # ── Pack B: Bot pod scheduling + storage env ──
  - id: RUNTIME_PROFILE_SCHEMA_ACCEPTS_K8S_KEYS
    type: script
    script: tests/runtime-api-profile-schema-accepts-k8s-keys.sh
    modes: [lite, compose, helm]
    state: stateless
    max_duration_sec: 15
    rationale: |
      Load a runtime-api profile YAML containing top-level
      `nodeSelector`, `tolerations`, `affinity` keys; assert profile
      validation accepts them without error. Closes B.1.
    approved: true

  - id: BOT_POD_SCHEDULING_FROM_PROFILE
    type: script
    script: tests/chart-bot-pod-scheduling.sh
    modes: [helm]
    state: stateless
    max_duration_sec: 15
    rationale: |
      Render chart with `--set global.botNodeSelector='{workload: bot}' --set global.botTolerations='[{key: workload, value: bot}]'`;
      assert rendered `vexa-runtime-profiles` ConfigMap profiles.yaml
      contains the populated nodeSelector + tolerations under
      `meeting:` and `browser-session:`. Closes B.2.
    approved: true

  - id: BOT_POD_RECORDING_ENV_PROPAGATED
    type: script
    script: tests/chart-bot-pod-recording-env.sh
    modes: [helm]
    state: stateless
    max_duration_sec: 15
    rationale: |
      Render chart with default storage config; assert rendered
      `vexa-runtime-profiles` ConfigMap profiles.yaml contains
      RECORDING_ENABLED, STORAGE_BACKEND, MEETING_API_URL,
      MINIO_BUCKET (or S3_*) in the meeting + browser-session env.
      Closes B.3.
    approved: true

  # ── Pack C: Redis client robustness ──
  - id: REDIS_CLIENT_HARDENED_TIMEOUTS
    type: grep
    file: services
    must_match: 'aioredis\.from_url\([^)]*socket_timeout[^)]*health_check_interval'
    multiline: true
    recursive: true
    modes: [lite, compose, helm]
    state: stateless
    max_duration_sec: 10
    rationale: |
      Recursive grep across services/* for `aioredis.from_url(...)`
      constructors; require socket_timeout AND health_check_interval
      keywords present. Closes C.1.
    approved: true

  - id: MEETING_API_COLLECTOR_LIVENESS
    type: script
    script: tests/meeting-api-collector-liveness.sh
    modes: [compose]
    state: stateful
    mutates: [redis_streams, meeting-api-pod]
    max_duration_sec: 90
    rationale: |
      Push 200 entries to `transcription_segments` stream; do not
      consume; `GET /health/collector` should return 503 within 60 s
      (lag > 100 + max_consumer_idle > 60s threshold). Closes C.2.
    approved: true

  - id: MEETING_API_READYZ_GATES_CONSUMER
    type: script
    script: tests/meeting-api-readyz-gates-consumer.sh
    modes: [compose]
    state: stateful
    mutates: [redis-pod, meeting-api-pod]
    max_duration_sec: 120
    rationale: |
      Start meeting-api with Redis NOT yet reachable (delay Redis
      startup); poll `/readyz`; expect 503 until consumer task is
      alive; expect 200 within 5 s of consumer starting. Closes C.4.
    approved: true

  - id: RUNTIME_API_REDIS_STARTUP_RETRY
    type: script
    script: tests/runtime-api-redis-startup-retry.sh
    modes: [compose]
    state: stateful
    mutates: [redis-pod, runtime-api-pod]
    max_duration_sec: 90
    rationale: |
      Start runtime-api with Redis not yet ready; expect zero
      CrashLoop in the first 60 s; bring Redis up; expect Ready
      within 30 s. Closes #248.
    approved: true

  - id: MEETING_API_COLLECTOR_RECOVERS_AFTER_REDIS_KILL
    type: script
    script: tests/meeting-api-collector-recovers-after-redis-kill.sh
    modes: [compose]
    state: stateful
    mutates: [redis-pod, transcriptions-table]
    max_duration_sec: 180
    rationale: |
      Start meeting + bot streaming; kill Redis pod; wait for Redis
      Ready; assert `transcriptions` table writes resume within 10 s
      of recovery. Today this would silently fail (consumer hung).
      Extends platform's existing `r1-redis-pod-kill-recovery.sh`
      from "no 5xx during outage" to "post-recovery PG-write resumes."
    approved: true

  - id: REDIS_AOF_AND_BGSAVE_PAIRED
    type: script
    script: tests/chart-redis-aof-bgsave-paired.sh
    modes: [helm]
    state: stateless
    max_duration_sec: 15
    rationale: |
      Render chart three times: (a) defaults — assert AOF + bgsave
      flags both present; (b) `--set redis.config.bgsaveErrorBlocksWrites=true`
      WITHOUT disabling AOF — assert helm template exits non-zero
      with `required` error; (c) explicit AOF=off + bgsave=no — same
      `required` error. Closes C.5b paired-config principle.
    approved: true

