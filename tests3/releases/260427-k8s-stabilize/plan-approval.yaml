# ── PROMETHEUS ALERT RULES ────────────────────────────────────────────
# Cross-cutting principle: alerting is robustness, not optional.
# Every sweep + retry-budget-exhausted path + canonical-mechanism-failed
# recovery in this cycle ships with a Prometheus alert in
# `templates/prometheusrule.yaml`, gated by
# `monitoring.prometheusRule.enabled: true`. Auto-recover is acceptable
# IFF accompanied by guaranteed observability that surfaces the
# canonical-path failure.

prometheus_rules_approved:

  - alert: MeetingApiSweepUnfinalizedRecordingsFiring
    expr: 'rate(meeting_api_sweep_unfinalized_recordings_total[5m]) > 0'
    for: 5m
    severity: warning
    rationale: "Sweep finding rows means E.1 outbox didn't deliver — investigate; not silent recovery."
    approved: true

  - alert: MeetingApiSweepStaleStoppingFiring
    expr: 'rate(meeting_api_sweep_stale_stopping_total[5m]) > 0'
    for: 5m
    severity: warning
    rationale: "Sweep finding rows means runtime-api exit callback didn't deliver — investigate; not silent recovery."
    approved: true

  - alert: MeetingApiAggregationFailedAccumulating
    expr: 'rate(meetings_aggregation_failed_total[15m]) > 0.1'
    for: 15m
    severity: warning
    rationale: "Pack H aggregation_failed transitions accumulating — tx-gateway likely degraded; H.4 sweep retries are firing."
    approved: true

  - alert: MeetingApiAggregationGivenUp
    expr: 'rate(meetings_aggregation_failed_permanent_total[1h]) > 0'
    for: 0m
    severity: critical
    rationale: "7-day retry budget exhausted on at least one meeting — operator action required."
    approved: true

  - alert: MeetingApiContainerStopDLQ
    expr: 'meeting_api_container_stop_dlq_total > 0'
    for: 5m
    severity: warning
    rationale: "Pack D.2 outbox DLQ entry — runtime-api stop call has failed beyond exponential-backoff budget; investigate."
    approved: true

  - alert: RedisMaxmemoryNear
    expr: 'redis_memory_used_bytes / redis_memory_max_bytes > 0.85'
    for: 5m
    severity: warning
    rationale: "Pack C.5 — eviction imminent; matches platform-side alert proposed in #267 layered fix."
    approved: true

  - alert: MeetingApiIdleLoopStalled
    expr: 'time() - meeting_api_idle_loop_last_iteration_timestamp > 300'
    for: 1m
    severity: critical
    rationale: "Watcher-of-the-watcher per [PLATFORM] refinement on #272. idle_loop being alive is the precondition for every sweep + retry in this cycle. Counter increments at the START of each iteration (not end) so a hung sweep handler shows up as 'iterations stop' instead of 'iterations slow.'"
    approved: true

  - alert: MeetingApiIdleLoopSweepTimeout
    expr: 'rate(meeting_api_idle_loop_sweep_timeout_total[5m]) > 0'
    for: 5m
    severity: warning
    rationale: "Per-sweep timeout via asyncio.wait_for(sweep_handler, timeout=4×IDLE_CHECK_INTERVAL). One hung sweep doesn't block the next iteration. Triage signal narrows from 'the loop hung' to 'WHICH sweep hung' via {sweep_name=...} label. Defense-in-depth on top of MeetingApiIdleLoopStalled."
    approved: true

  - alert: BrowserSessionPodsOrphaned
    expr: 'runtime_api_browser_session_pods_orphaned_total > 0'
    for: 5m
    severity: warning
    rationale: "Pack K.3 — `reconcile_browser_sessions` sweep found pods present in K8s but missing from Redis state index. Each occurrence is a sign that pod-creation flow bypassed the state index OR an external operator deleted the index entry. Investigate; not silent recovery."
    approved: true

  - alert: MeetingsDataRowSizeP99High
    expr: 'histogram_quantile(0.99, rate(meetings_data_row_size_bytes_bucket[1h])) > 200000'
    for: 30m
    severity: warning
    rationale: "Pack M.2 — surfaces meetings.data JSONB structural debt without committing to a fix in this cycle. Threshold 200KB p99 is best-guess at plan-stage; develop-stage measurement adjusts. Hitting this fires the next architectural-cleanup cycle (promote queried JSONB keys to columns + split audit-log arrays into tables)."
    approved: true

  - alert: RuntimeApiIdleLoopStalled
    expr: 'time() - runtime_api_idle_loop_last_iteration_timestamp > 300'
    for: 1m
    severity: critical
    rationale: "Pack K.5 — analog of MeetingApiIdleLoopStalled for runtime-api side. [PLATFORM] data on #273 showed zero idle_loop log lines in last 1h with no way to disambiguate 'running silently' vs 'not running at all.' Counter increments at the START of each iteration; alert fires if loop hasn't ticked in 5×IDLE_CHECK_INTERVAL. Closes the observability gap and is defense-in-depth for K.2 reconcile sweep — sweep can only fire if the loop is alive."
    approved: true

