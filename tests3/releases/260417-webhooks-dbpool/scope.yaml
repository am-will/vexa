release_id: 260417-webhooks-dbpool
branch: dev
summary: |
  Webhook delivery hardening (gateway injection + status webhooks + delivery
  tracking), DB connection pool fix + Postgres-side timeout, collector
  NOGROUP recovery, structured test reports + per-feature DoD rollup, and
  release validation refactor into a 7-step commanded process.

deployments:
  modes: [lite, compose, helm]

issues:
  - id: webhook-gateway-injection
    source: human
    problem: |
      User-configured webhooks (via PUT /user/webhook) are not delivered —
      user.data has webhook_url/secret/events but meeting.data on new bots
      never gets them. "We only see meeting.completed; status webhooks never
      arrive."
    hypothesis: |
      Gateway's forward_request() injects X-User-Id/Scopes/Limits but never
      X-User-Webhook-*. Admin-api's validate_token() never returns webhook
      fields. Meeting-api reads headers from request but they're always
      missing. Close by: strip client-supplied X-User-Webhook-* too (anti-spoof).
    fix_commits: [fd2526c, b953d44]
    proves:
      - {test: webhooks, step: config, modes: [compose]}
      - {test: webhooks, step: inject, modes: [compose, helm]}
      - {test: webhooks, step: spoof, modes: [compose, helm]}
    required_modes: [compose]
    human_verify:
      - mode: compose
        do: "PUT /user/webhook with {webhook_url: https://httpbin.org/post, webhook_events: {meeting.completed:true}}"
        expect: "POST /bots (no X-User-Webhook-* header) → response.data.webhook_url == your URL"
      - mode: compose
        do: "Repeat POST /bots but WITH a client-supplied X-User-Webhook-URL: https://attacker.example.com/steal"
        expect: "response.data.webhook_url is your URL, NOT the attacker URL (header stripped)"

  - id: webhook-status-fast-path
    source: human
    problem: |
      Status-change webhooks (meeting.started, meeting.stopping, bot.failed)
      never fire end-to-end even after gateway injection works. Completion
      webhook fires once but webhook_deliveries[] stays empty.
    hypothesis: |
      schedule_status_webhook_task is only wired into the unified callback
      and the STOPPING transition. Misses 4 paths: no-container fast-path,
      <5s pre-active fast-path, scheduler_timeout no-container, and
      delayed_stop_finalizer. send_status_webhook has no delivery log.
    fix_commits: [b953d44, 0ac59fe]
    proves:
      - {test: webhooks, step: e2e_completion, modes: [compose]}
      - {test: webhooks, step: e2e_status, modes: [compose]}
    required_modes: [compose]
    human_verify:
      - mode: compose
        do: "PUT /user/webhook with webhook_events={meeting.completed:true, meeting.status_change:true}; POST /bots with a fake google_meet URL; DELETE immediately (<5s → hits fast-path)"
        expect: "After 20s, meeting.data has webhook_delivery.status=delivered AND webhook_deliveries[] has >= 1 entry"

  - id: db-pool-exhaustion
    source: human
    problem: |
      GET /bots/status returns 504 after ~10 sequential requests in compose
      and helm. Pool (5+5=10) fills; new requests block 30s on pool_timeout
      then fail.
    hypothesis: |
      Sessions held open during async I/O (Redis ttl refresh, httpx calls
      to transcription-collector, run_all_tasks) leave transactions idle.
      Pool defaults (5/5/30) are too tight even after the code fix. No
      Postgres-side timeout to kill zombie transactions.
    fix_commits: [fd2526c, c797e9f]
    proves:
      - {check: DB_POOL_NO_EXHAUSTION, modes: [lite, compose, helm]}
    required_modes: [lite, compose, helm]
    human_verify:
      - mode: compose
        do: "Hit GET /bots/status 30 times in a loop (`for i in $(seq 1 30); do curl -sf -H 'X-API-Key: ...' http://{vm_ip}:8056/bots/status -o /dev/null -w '%{http_code}\\n'; done`)"
        expect: "Every response is 200; no 504s"
      - mode: compose
        do: "Check Postgres for idle-in-transaction connections: `docker exec vexa-postgres-1 psql -U postgres -d vexa -c \"SELECT count(*) FROM pg_stat_activity WHERE state='idle in transaction';\"`"
        expect: "count is 0 (or near 0) even after sustained load"

  - id: transcripts-gone-after-stop
    source: human
    problem: |
      Short meetings show transcripts during recording but 0 rows in
      transcriptions table after completion. Reported on lite meeting 2.
    hypothesis: |
      Collector creates consumer groups at startup. If Redis loses them
      (eviction / FLUSHALL / restart while meeting-api stays up), the
      loop traps NOGROUP as generic Exception, sleeps 5s, never recovers.
    fix_commits: [aace988]
    proves:
      # No dedicated test yet — tracked as Phase D gap.
      # Current proxy: if the full webhook e2e delivers, the pipeline is
      # alive end to end; verify separately via the recovery drill below.
      - {test: webhooks, step: e2e_completion, modes: [lite, compose]}
    required_modes: [lite, compose]
    human_verify:
      - mode: lite
        do: "Force Redis group loss: `docker exec vexa-lite redis-cli XGROUP DESTROY transcription_segments collector_group; docker exec vexa-lite redis-cli XGROUP DESTROY speaker_events_relative collector_speaker_group` — wait 15s"
        expect: "Logs show `Recreated consumer group 'collector_group'` within 10s; `docker exec vexa-lite redis-cli XINFO GROUPS transcription_segments` shows the group back"
      - mode: lite
        do: "Run a real ~60s meeting end-to-end (bot + audio), stop bot"
        expect: "meeting.data.end_time set AND `SELECT COUNT(*) FROM transcriptions WHERE meeting_id=<id>` > 0"

  - id: recording-enabled-default
    source: human
    problem: |
      Lite bots recorded by default but compose/helm defaulted to no
      recording (BOT_CONFIG recordingEnabled=false), so recordings were
      empty unless RECORDING_ENABLED=true was explicitly set.
    hypothesis: |
      Code defaults `os.getenv("RECORDING_ENABLED","false")` in meeting-api
      used 4 times; should default "true" to match user expectation.
    fix_commits: [fd2526c]
    proves:
      - {check: BOT_RECORDING_ENABLED, modes: [compose, helm]}
    required_modes: [compose]
    human_verify:
      - mode: compose
        do: "POST /bots without `recording_enabled` in the body"
        expect: "response.data.recording_enabled == true"

expensive_tests: []

strict_features:
  - webhooks
  - infrastructure
  - meeting-urls
