# ── Pack G — Bot pod log capture ─────────────────────────────────────
- id: bot-pod-log-capture-compliance-coupled
  source: gh-issue
  ref: "Vexa-ai/vexa#272 issue 6"
  problem: |
    When a bot pod dies, its `[Graceful Leave]` shutdown logs vanish
    with the pod. The `meeting-api` `[Delayed Stop]` (90 s) has time
    to capture them but doesn't. Every recording-loss bug becomes a
    "we don't know why" post-mortem unless someone happened to be
    tailing logs during the failure. Multiplies the diagnostic cost
    of every other pack.
  hypothesis: |
    (G.1) Bot pods log structured JSON to stdout (basic logging
          discipline; required for everything else to parse). Audit
          `services/vexa-bot/core/src/`; every log line is a single-
          line JSON object with `{ts, level, msg, meeting_id,
          session_uid, platform, ...fields}`. Existing prefix-tagged
          logs (`[Graceful Leave]`, `[Recording]`) become structured
          fields, not embedded prefixes.
    (G.2) runtime-api lifecycle captures `kubectl logs <bot-pod>
          --tail=10000 --previous=false` on bot exit, persists into
          `meetings.data.bot_logs` (JSONB array). Bounded 50 KB per
          meeting (head-N + tail-N + truncation marker on overflow).
          Lifetime-coupled to the meeting: purged with the row per
          operator's `data_retention_days`. Default ON.
    (G.3) `kubectl logs --previous` for crashes; same destination.
    (G.4) Opt-in long-lived aggregator via `runtimeProfiles.{...}.sidecars: []`
          chart values extension point + documented `values-loki-example.yaml`.
          Default OFF. Operators turning ON explicitly opt OUT of
          `data_retention_days` contract — documented trade-off.
    (G.5) Docs: `docs/operations/bot-log-aggregation.md` covers the
          three paths + their data-protection implications.
    Compliance-coupled by construction: JSONB lifecycle = meeting
    lifecycle, by structural placement not policy. Two paths, both
    principled, operator picks consciously.
  fix_commits: []
  proves:
    - {check: BOT_LOGS_STRUCTURED_JSON, modes: [lite]}
    - {check: RUNTIME_API_CAPTURES_LOGS_PRE_REAP, modes: [compose]}
    - {check: BOT_LOGS_PURGED_WITH_MEETING, modes: [compose]}
    - {check: BOT_LOGS_BOUNDED_SIZE, modes: [compose]}
  required_modes: [compose]
  human_verify:
    - mode: compose
      do: "Dispatch a bot, kill it with SIGKILL, query `meetings.data.bot_logs` after 30 s"
      expect: "JSONB array populated with structured records; final entries include the SIGKILL signal capture from `--previous`"
    - mode: compose
      do: "Run a meeting with verbose bot logging; verify `meetings.data.bot_logs` JSONB stays under 50 KB"
      expect: "Truncation marker present; head-N + tail-N preserved; total under 50 KB"
    - mode: compose
      do: "Trigger data-retention purge against an aged meeting"
      expect: "`bot_logs` JSONB purged with the meetings row; no orphan log artifacts"

# ── Pack H — post_meeting transient/permanent classification ─────────
- id: post-meeting-aggregation-state-machine
  source: human
  ref: "vexa-platform/docs/incidents/2026-04-23-post-meeting-collector-503"
  problem: |
    `services/meeting-api/meeting_api/post_meeting.py` `aggregate_transcription`
    treats any non-200 from tx-gateway identically (`return` →
    meeting marked `failed`). A 503 from a tx-gateway pod restart is
    treated identically to "transcripts not ready" — the meeting
    transitions to `failed` with empty transcript. Real-world
    trigger 2026-04-23: tx-gateway pod restart during a post_meeting
    request → 23 consecutive meetings marked `failed` despite the
    transcripts being recoverable. `meeting.failed` webhook fires
    incorrectly, signalling "transcription broken" to downstream
    consumers when the real state is "transient gateway flap."
  gap_analysis: |
    No automated check exercises the path "post_meeting + tx-gateway
    restart concurrently." The compose smoke matrix tests
    aggregate_transcription happy path only; the OSS-side validate
    matrix has no chaos-tier test that kills tx-gateway during a
    post_meeting flow. Pack H's regression check
    `POST_MEETING_5XX_RETRIES_NOT_FAILS` closes the gap.
  new_checks:
    - TRANSIENT_5XX_RETRIED_AT_TRANSPORT_LAYER
    - AGGREGATION_FAILURE_CLASS_VIA_TYPED_HELPER
    - AGGREGATION_FAILED_VS_USER_FAILED_DISTINCT
    - POST_MEETING_5XX_RETRIES_NOT_FAILS
  hypothesis: |
    (H.1) Retry-on-5xx lives in meeting-api's internal HTTP client
          wrapper, NOT special-cased per call site. One place, one
          policy, applies to every internal-RPC site by construction.
          5 attempts, exponential backoff 2-30 s. 4xx returns
          immediately; the caller distinguishes 5xx (transient) from
          4xx (permanent).
    (H.2) **MIGRATION-FREE shape (revised per principle audit):**
          Keep existing `meetings.status` enum as-is — NO PG migration.
          Discrimination lives in `meetings.data` (existing JSONB
          column; new keys, NOT new columns):
            data.aggregation_failure_class: str   # "transient_infra" | "permanent_infra" | "user_meaningful"
            data.aggregation_retry_count:   int
            data.aggregation_last_retry_at: ISO8601 str
          Type-safety: Python `AggregationFailureClass` enum class in
          `meeting_api/post_meeting.py`; ALL writes go through a single
          `set_aggregation_failure_class(meeting, cls)` helper.
          Static-grep registry check (H.6 below) refuses any code
          path that writes `data['aggregation_failure_class']` outside
          the helper. Same enforcement guarantee a PG enum gives —
          via app-layer + tests + grep — without the migration cost.
    (H.3) Separate webhook events `meeting.aggregation_failed`
          (transient-infra retry-budget exhausted, retry-eligible) +
          `meeting.aggregation_failed_permanent` (after 7-day budget
          exhaustion, terminal). Distinct from `meeting.failed`
          (user-meaningful). Webhook events are app-level — no schema
          change anyway. Branch on `data.aggregation_failure_class`,
          not on a status enum value.
    (H.4) idle_loop sweep query (uses existing columns, NO migration):
            SELECT id FROM meetings
             WHERE status = 'failed'
               AND data->>'aggregation_failure_class' = 'transient_infra'
               AND (data->>'aggregation_last_retry_at')::timestamp
                   < now() - <exponential-backoff window>
          Retries up to 24 attempts × exponential backoff up to 1 day,
          total ~7 days. On success → status='completed' + clear
          aggregation_failure_class. On exhaustion → keep status='failed',
          flip aggregation_failure_class='permanent_infra', emit
          `meeting.aggregation_failed_permanent`, alert critical.
          Same idle_loop pattern as Pack E.3; zero new infrastructure;
          zero schema change.
    (H.5 OPTIONAL — performance optimization, defer to develop stage)
          If the sweep query performance is a concern at scale (it
          isn't expected to be — sweep runs every IDLE_CHECK_INTERVAL
          on a small population of `failed` rows), add a partial index:
            CREATE INDEX CONCURRENTLY meetings_aggregation_retry_idx
              ON meetings ((data->>'aggregation_failure_class'))
              WHERE status = 'failed'
                AND data->>'aggregation_failure_class' = 'transient_infra';
          This IS a schema-side change but: (a) it's a partial index,
          not a column or enum migration; (b) `CREATE INDEX CONCURRENTLY`
          is non-blocking; (c) only added if observed performance
          warrants it. Develop-stage measurement, not plan-stage commit.
    Industry best practice: fault-isolation through application-layer
    typed discriminator; retry policy at the transport layer (single
    source of truth); bounded escalation timeline. No silent skip, no
    "leave in processing forever" workaround. **Zero schema migrations.**
  fix_commits: []
  proves:
    - {check: TRANSIENT_5XX_RETRIED_AT_TRANSPORT_LAYER, modes: [lite, compose]}
    - {check: AGGREGATION_FAILURE_CLASS_VIA_TYPED_HELPER, modes: [lite, compose]}
    - {check: AGGREGATION_FAILED_VS_USER_FAILED_DISTINCT, modes: [compose]}
    - {check: POST_MEETING_5XX_RETRIES_NOT_FAILS, modes: [compose]}
  required_modes: [compose]
  human_verify:
    - mode: compose
      do: "Run a meeting end-to-end; mid-aggregation, `docker restart transcription-gateway`; observe meeting status + JSONB"
      expect: "Either retries succeed (status `completed`, no aggregation_failure_class set) OR meeting goes to status=`failed` WITH `data.aggregation_failure_class='transient_infra'` AND `meeting.aggregation_failed` event fires (NOT `meeting.failed`). No PG schema migration ran during the test."
    - mode: compose
      do: "Stress: hold tx-gateway down for 8 days, observe idle_loop sweep behavior"
      expect: "Meeting initially has `data.aggregation_failure_class='transient_infra'`; after 7-day retry budget, flips to `data.aggregation_failure_class='permanent_infra'`; status remains `failed` throughout; `MeetingApiAggregationGivenUp` critical alert fires"

# ── Pack I — Chart availability defaults ─────────────────────────────
- id: chart-availability-defaults-stateless
  source: human
  ref: "vexa-platform/docs/gaps.md (All services replicaCount=1 + Missing health probes)"
  problem: |
    OSS chart ships every stateless service with `replicaCount: 1`
    and no PodDisruptionBudget by default. Several services
    (admin-api, api-gateway, tts-service, mcp, transcription-collector
    per gaps.md) lack readiness/liveness probes entirely. Every
    operator inheriting OSS-chart defaults gets a degraded-availability
    deploy: single-pod services = brief outage on every node drain,
    every pod crash, every helm upgrade; missing probes = K8s can't
    detect unhealthy pods, dead pods keep receiving traffic.
    260421 Pack G fixed this for `apiGateway` only; the rest of the
    stateless service set inherits the gap.
  gap_analysis: |
    The OSS validate matrix renders the chart and asserts presence of
    individual templates but doesn't enforce industry-best-practice
    availability defaults across the stateless service set. No
    existing check requires `replicaCount: ≥ 2`, no check requires
    PDB presence, no check requires both readiness + liveness probes
    on every Deployment. Pack I introduces the four
    `CHART_STATELESS_*` checks to formalize the contract.
  new_checks:
    - CHART_STATELESS_SERVICES_REPLICACOUNT_AT_LEAST_2
    - CHART_STATELESS_SERVICES_HAVE_PDB
    - CHART_STATELESS_SERVICES_HAVE_PROBES
    - CHART_STATELESS_SERVICES_GRACE_PERIOD
  hypothesis: |
    Extend 260421 Pack G's apiGateway pattern to the rest of the
    stateless OSS service set: meetingApi, runtimeApi, adminApi,
    dashboard, transcriptionGateway. Specifically:
    (I.1) Default `replicaCount: 2` for each stateless service in
          chart values.
    (I.2) PDB templates gated by `<service>.podDisruptionBudget.enabled: true`
          (default ON). `minAvailable: 1`.
    (I.3) `readinessProbe` + `livenessProbe` (HTTP `/healthz`) on
          every stateless Deployment template; sane defaults for
          `initialDelaySeconds`, `periodSeconds`, `timeoutSeconds`,
          `failureThreshold`.
    (I.4) `terminationGracePeriodSeconds: 30` explicit on every
          stateless Deployment.
    State-bearing services (Postgres, Redis, MinIO) NOT touched —
    their replication shape is a separate (bigger) architectural
    cycle; not in 260427 scope.
    Pack C's meeting-api `/readyz` (Pack C.4.2) is the specialized
    case of I.3's baseline `/healthz`; the two compose cleanly.
  fix_commits: []
  proves:
