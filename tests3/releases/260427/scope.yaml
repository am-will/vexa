  problem: |
    The `feature/disable-incoming-video` branch shipped surgical fixes
    for #168 (`voice_agent_enabled` default True → False) and #169
    (bot reading `everyoneLeftTimeoutSeconds` instead of the actual
    field name `everyoneLeftTimeout` from the BOT_CONFIG message).
    Both are merged. Both issues stay OPEN because the structural
    prevention #255 epic explicitly says "lands here" — a contract-
    parity check between bot-side TypeScript types and meeting-api
    Pydantic schemas — never landed. The next field-rename drift
    will reproduce #169-class regressions at PR time and land in
    production as "bots exit at 10 s." Pure prevention; pure
    industry best practice (consumer-driven contract tests).
