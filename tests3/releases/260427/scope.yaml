    - {check: CHART_STATELESS_SERVICES_HAVE_PDB, modes: [helm]}
    - {check: CHART_STATELESS_SERVICES_HAVE_PROBES, modes: [helm]}
    - {check: CHART_STATELESS_SERVICES_GRACE_PERIOD, modes: [helm]}
  required_modes: [helm]
  human_verify:
    - mode: helm
      do: "Render with default values; `helm template ... | grep -c 'replicas: [1-9]'` per stateless Deployment"
      expect: "Every stateless Deployment renders with `replicas: ≥ 2`; every one has a sibling PDB with `minAvailable: 1`; every one has `readinessProbe` + `livenessProbe` blocks"
    - mode: helm
