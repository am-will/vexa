    (N.1) Static contract test between bot-side `BotConfig` shape
          (`services/vexa-bot/core/src/types.ts`) and meeting-api
          `MeetingCreate` Pydantic schema. Snapshot test: regenerates
          the bot-side TS type from the Pydantic schema (or the
          inverse — extracts both into a JSON Schema and diffs). Fails
          on rename / type-shape drift at PR time.
    (N.2) Same shape for `MeetingStatus` enum mirror between
          meeting-api ↔ runtime-api ↔ bot. Status enum values must
          stay in sync across services.
    (N.3) Close #168 + #169 GH issues post-merge: "surgical fix
          shipped earlier; structural follow-on landed in 260427
          Pack N." Mechanical issue hygiene.
    Pure prevention. Catches the next regression at PR time, not
    at production-bot-exits-at-10s time. ~½ d.
  gap_analysis: |
    Today's CI matrix has zero contract tests between bot ↔
    meeting-api. The #169 surgical fix was a one-instance fix; the
    next field rename has nothing stopping it from regressing. Pack
    N closes the gap.
  new_checks:
