# ── Pack J — Bot exit classification refinement (NEW; un-deferred from #255 epic) ──
- id: bot-exit-classification-refinement
  source: gh-issue
  ref: Vexa-ai/vexa#255
  problem: |
    Two complementary misclassification gaps in `MeetingCompletionReason`
    taxonomy:
    (a) **Silent class** — bots that exit abnormally (admission DOM
        button not found, audio pipeline failed to start, OOM-killed,
        kicked from meeting, network lost mid-meeting, zero segments
        produced) silently land in `status='completed'`. Project-owner
        observation: dashboard shows "completed" for meetings that
        didn't actually transcribe anything.
    (b) **Dual class (#233)** — bots that exit cleanly after a
        successful meeting (segments produced, admission confirmed)
        sometimes get marked `status='failed'` because runtime-api's
        callback path classifies any bot exit as failed by default.
        Production evidence in #233 body (meeting 10743).
    Both are state-machine correctness gaps; both share the same code
    surface (runtime-api `handle_container_exit`, meeting-api callback
    handler, bot exit emission); both close together.
  hypothesis: |
    **DATA-DRIVEN REFINEMENT (post #255 [PLATFORM] data 2026-04-27 11:31Z).**
    Production query confirmed 557 / 1183 (47%) of `completed` meetings
    in last 30 days are misclassified — 125 substantive (transcribe
    enabled, ≥30s, 0 segs) + 432 pre-admission. **The classification
    signals already exist** (`completion_reason` enumerates
    awaiting_admission_timeout, awaiting_admission_rejected, evicted,
    max_bot_time_exceeded, etc.) but **the meeting-api callback
    handler ignores them and writes `status='completed'` regardless**.
    Pack J therefore refocuses from taxonomy expansion to routing-rule
    fix + 2 prod-derived enum additions.

    Migration-free (`meetings.status` is `String(50)`, not PG ENUM;
    `completion_reason` is JSONB string in `meetings.data`):

    (J.1 — slimmed to 2 prod-derived values) Extend
    `MeetingCompletionReason` Python enum with:
      - `STOPPED_BEFORE_ADMISSION` — for `reason=stopped AND duration=0`
        (the 432 pre-admission misclassification class)
      - `STOPPED_WITH_NO_AUDIO`    — for `reason=stopped AND duration>=30s
        AND transcribe_enabled AND transcription_count=0` (the 125
        substantive class)
    Speculative catalog from original proposal (BOT_CRASHED, OOM_KILLED,
    NETWORK_LOST, ADMISSION_BUTTON_NOT_FOUND, AUDIO_PIPELINE_FAILED,
    KICKED_FROM_MEETING) **moves to J.5b future-catalog** — added when
    actual prod cases surface, not preemptively. Pack J ships only
    what data justifies.

    (J.2 — DEFERRED) Bot-side `meeting_aborted` callback for new
    failure detection (admission DOM not found, audio capture failed).
    Data shows this is NOT blocking — current `completion_reason`
    signals are sufficient for J.4. Files as a Pack J.2 follow-on
    issue tracked at ship-stage; revisit when speculative catalog
    values actually appear in prod.

    (J.3 — KEPT) `services/runtime-api/runtime_api/lifecycle.py:handle_container_exit`
    captures K8s pod events (OOMKill / Evicted / Error markers via
    `kubectl get events --field-selector involvedObject.name=<pod>`)
    BEFORE the pod is reaped. The `evicted × completed` (n=6 in prod
    data) case is the proof — runtime-api's callback already detected
    the eviction; meeting-api ignored the signal. J.3 makes the signal
    capture robust against the cluster's 1-hour event-retention limit.

    (J.4 — PRIMARY FIX, clarified) Routing rule in meeting-api callback
    handler. Replaces today's "any non-explicit-failure → completed"
    default with explicit mapping:
        if completion_reason in {
            AWAITING_ADMISSION_TIMEOUT,    # was: completed × 72
            AWAITING_ADMISSION_REJECTED,   # was: completed × 9
            EVICTED,                        # was: completed × 6
            MAX_BOT_TIME_EXCEEDED,          # was: completed × 10
            VALIDATION_ERROR,
            STOPPED_BEFORE_ADMISSION,       # NEW
            STOPPED_WITH_NO_AUDIO,          # NEW
        }: status = FAILED
        elif completion_reason == STOPPED:
            if duration_seconds == 0:
                status, reason = FAILED, STOPPED_BEFORE_ADMISSION
            elif duration_seconds >= 30 and transcribe_enabled \
                 and transcription_count == 0:
                status, reason = FAILED, STOPPED_WITH_NO_AUDIO
            else:
                status = COMPLETED   # legitimate user quick-stop OR success
        else:
            # Defensive: unknown reason → failed (no silent completion)
            status = FAILED
    Same DB column, same enum values (mostly), different status setter
    logic. ~30 lines of code change. No data migration; reclassifies
    47% of historical completion records on read (operators see
    accurate state going forward).

    (J.5 — refined regression checks, anchored to prod patterns) Six
    compose-mode integration tests, each fixture-driven against an
    actual prod misclassification pattern:
      - awaiting_admission_timeout fixture → assert FAILED
      - awaiting_admission_rejected fixture → assert FAILED
      - evicted (K8s killed pod) fixture → assert FAILED
      - max_bot_time_exceeded fixture → assert FAILED
      - stopped + duration=0 fixture → assert FAILED + STOPPED_BEFORE_ADMISSION
      - stopped + duration=60s + 0 segs fixture → assert FAILED + STOPPED_WITH_NO_AUDIO

    (J.5b — DEFERRED future catalog) Speculative reasons (BOT_CRASHED
    etc) added when prod evidence surfaces. Not in 260427.

    (J.6 — KEPT) Symmetric dual-direction guard for #233: clean exits
    with positive proof of success → `completed` (NOT silently `failed`).
    Same code surface as J.4. Closes #233's structural taxonomy gap.

    **Refined estimate ~1 d** (was ~1.5 d): J.1 enum extension ~10
    lines; J.4 routing rule ~30 lines; J.5 6 fixtures ~½ d; J.3 K8s
    event capture ~½ d; J.2 deferred; J.6 covered by J.4.

    Sample meeting IDs from #255 [PLATFORM] data drop (10 most recent)
    will become Pack J.5 fixture seeds: 11000-11003 google_meet group
    (4-10 min duration, STOPPED_WITH_NO_AUDIO pattern), 11033 teams
    (66s, cross-platform check).
  gap_analysis: |
    Today's classification taxonomy has only 7 `MeetingCompletionReason`
    values; runtime-api's exit path defaults to "completed" on any
    clean exit without checking whether the meeting actually produced
    transcripts. The matrix doesn't have a chaos test that asserts
    "bot crashed → meeting marked failed" or "bot ran but zero segments
    → meeting marked failed." Pack J's catalog + J.5 integration tests
    close the gap.
  new_checks:
    - BOT_ABNORMAL_EXIT_CATALOG_COMPLETE
    - BOT_EXIT_CLASSIFICATION_REQUIRES_POSITIVE_SUCCESS
    - BOT_CLEAN_EXIT_NOT_MISCLASSIFIED_FAILED
  fix_commits: []
  proves:
    - {check: BOT_ABNORMAL_EXIT_CATALOG_COMPLETE, modes: [lite, compose]}
    - {check: BOT_EXIT_CLASSIFICATION_REQUIRES_POSITIVE_SUCCESS, modes: [compose]}
    - {check: BOT_CLEAN_EXIT_NOT_MISCLASSIFIED_FAILED, modes: [compose]}
  required_modes: [compose]
  human_verify:
    - mode: compose
      do: "Dispatch a bot, kill it mid-active with SIGKILL (simulate OOM); wait for meeting to terminalize; query DB"
      expect: "Meeting status='failed', `data.completion_reason`='OOM_KILLED' or 'BOT_CRASHED'; NOT 'completed'"
    - mode: compose
      do: "Dispatch a bot to a meeting where bot's admission flow fails (test fixture: admit button not present); wait for terminal state"
      expect: "Meeting status='failed', `data.completion_reason`='ADMISSION_BUTTON_NOT_FOUND'; NOT 'completed'"
