# ── Pack K — Browser-session idle eviction (NEW; filed at #273) ──
- id: browser-session-idle-eviction
  source: gh-issue
  ref: Vexa-ai/vexa#273
  problem: |
    Browser-session pods are not garbage-collected when idle, despite
    the mechanism being in place: `runtime-api/profiles.yaml` declares
    `browser-session: idle_timeout: 3600` (1 h) and
    `runtime-api/lifecycle.py:idle_loop` iterates
    `state.list_containers(redis)` every IDLE_CHECK_INTERVAL, stopping
    containers idle past their timeout. Project-owner reports browser-
    session pods linger in K8s far past their idle window.
    Distinct from #258 (entrypoint `wait` keeps container alive after
    node exits — Pack D.3 / PR #260). #258 is the "node-exited but
    pod-still-Running" half; #273 is the "pod-genuinely-idle but
    never-reaped" half.
  hypothesis: |
    **DATA-DRIVEN REFINEMENT (post #273 [PLATFORM] data 2026-04-27 11:32Z).**
    Production audit found 14 stale `browser_session:*` Redis keys
    pointing at container_names that are gone from K8s; ZERO actual
    K8s browser-session pods alive. The hypothesized failure mode
    (pods living too long when idle) is INVERSE of reality —
    K8s reaps the pod faster than the Redis state index reconciles,
    leaving stale entries that the API serves as if live. User-visible
    symptom: "Browser session not found or expired" on dashboard.

    Pack K refocuses on reconcile-sweep-as-primary; investigation of
    `/touch` semantics is deprioritized as data shows pods aren't
    over-running.

    (K.1 — DEFERRED, possibly unnecessary) Gateway `/touch` semantics
    audit. Data shows pods are being reaped on time; `/touch` audit
    was hedging against the inverse failure mode that doesn't exist.
    Re-evaluate at ship-stage triage; if K.2 closes the user-visible
    symptom, K.1 is moot.

    (K.2 — PROMOTED to PRIMARY, ~½ d) `reconcile_browser_sessions`
    sweep in runtime-api `idle_loop`:
        for key in redis.scan(match="browser_session:*"):
            entry = redis.get(key)
            container_name = entry["container_name"]
            if not k8s.pod_exists(container_name):
                redis.delete(key)
                metrics.runtime_api_browser_session_pods_orphaned_total.inc()
                logger.warning(f"Reconciled orphan browser_session: {key} -> {container_name} (K8s pod missing)")
    Architecturally correct regardless of what's reaping the K8s side.
    Sweep iterates ALL `browser_session:*` entries by structure; doesn't
    require platform's specific cluster shape.

    (K.3 — REFRAMED to log-line; observability infra is [PLATFORM]'s)
    Per project-owner clarification 2026-04-27 ~15:13Z, OSS does not
    ship Prometheus metrics/alerts. The reconcile sweep emits a
    structured log line on each orphan-find:
        logger.warning(f"[K2] reconcile_orphan browser_session={key} container={name} k8s_pod_missing=True")
    [PLATFORM]'s log-pipeline / observer consumes the rate signal.
    Same observability outcome, OSS stays out of the metrics tier.

    (K.4 — REFINED to test the actual prod failure mode, ~¼ d)
    Compose-mode integration test:
      1. Dispatch browser-session pod
      2. Externally kill the K8s pod (mimic K8s eviction / natural exit)
      3. Assert Redis state is reconciled within IDLE_CHECK_INTERVAL × 1.5
      4. Assert subsequent client query for that browser_session
         returns 404 NOT stale-entry

    (K.5 — REFRAMED as in-process counter + log line; observability
    infra is [PLATFORM]'s) Per project-owner clarification 2026-04-27
    ~15:13Z, OSS doesn't ship Prometheus deps. Implementation:
    module-level globals `idle_loop_iterations` (int) +
    `idle_loop_last_iteration_at` (ISO timestamp) updated at start of
    each iteration in `runtime_api/lifecycle.py`, plus a structured
    log line every iteration:
        logger.info(f"[K5] idle_loop iteration={iteration} ts={now}")
    [PLATFORM]'s observer consumes the log-line cadence + can scrape
    the in-memory globals via /healthz endpoint if/when their tier
    needs structured numbers. Closes the observability gap from
    [PLATFORM] data Finding 3 (no way to disambiguate "running
    silently" vs "not running at all"); defense-in-depth on top of
    K.2's reconcile.

    Re-prioritized total: ~1 d (unchanged in effort; reshaped in
    sequence). Plan-stage should also confirm rendered chart values
    match `runtime-api/profiles.yaml`'s `auto_remove: false` (a
    chart-override discrepancy could explain why the K8s reaper
    fires faster than expected).
  gap_analysis: |
    No automated check today exercises the browser-session idle-
    eviction path end-to-end. Compose smoke matrix tests dispatch +
    transcribe but doesn't test the "create then leave alone" path.
    Pack K's K.4 integration test closes the gap.
  new_checks:
    - BROWSER_SESSION_IDLE_EVICTION_FIRES
    - BROWSER_SESSION_K8S_VS_REDIS_RECONCILED
  fix_commits: []
  proves:
    - {check: BROWSER_SESSION_IDLE_EVICTION_FIRES, modes: [compose]}
    - {check: BROWSER_SESSION_K8S_VS_REDIS_RECONCILED, modes: [compose]}
  required_modes: [compose]
  human_verify:
    - mode: compose
      do: "Dispatch a browser-session bot, do NOT `/touch` it for 70 min (test override of idle_timeout to 60s + buffer)"
      expect: "Pod transitions to Succeeded/Completed within idle_timeout + 5×IDLE_CHECK_INTERVAL; no manual cleanup needed"
    - mode: compose
      do: "Manually delete a browser-session entry from Redis state index while leaving the K8s pod running"
      expect: "Within IDLE_CHECK_INTERVAL, reconcile_browser_sessions sweep reaps the orphan pod; `runtime_api_browser_session_pods_orphaned_total` metric increments; alert fires"

# ── Pack L — Slim meeting list endpoint (NEW; #263 + #264) ──
- id: slim-meeting-list-endpoint
  source: gh-issue
  ref: Vexa-ai/vexa#263
  problem: |
    `GET /bots` (the user-facing meeting list endpoint, served via
    api-gateway as `/meetings`) returns the entire `m.data` JSONB
    column for every row. At production scale, a single response with
    `?limit=10` is **354 KB** (~35 KB per meeting). Default dashboard
    `/meetings` page loads with `limit=50` → ~1.7 MB per page load.
    Beyond perf, this is a robustness concern at scale: 100 meetings
    × 35 KB × N polling clients = meeting-api egress saturation + a
    DoS vector. Industry-best-practice REST distinguishes list view
    (summary) from detail view (full).
  hypothesis: |
    (L.1) Replace `"data": m.data or {}` in `list_user_bots`
          (services/meeting-api/meeting_api/meetings.py:1238) with
          explicit projection of fields the dashboard list view
          actually consumes (audited from
          services/dashboard/src/components/meetings/meeting-card.tsx
          + ai-chat-panel.tsx + export.ts):
              data_summary = {
                "name":            data.get("name") or data.get("title"),
                "completion_reason": data.get("completion_reason"),
                "participants":    (data.get("participants") or [])[:3],
                "participants_count": len(data.get("participants") or []),
                "notes_preview":   (data.get("notes") or "")[:120],
                "languages":       data.get("languages"),
                "last_transition": (data.get("status_transition") or [{}])[-1],
                "duration_seconds": derived from start_time/end_time,
                "has_recording":   bool(data.get("recordings")),
              }
          Per-meeting payload: ~1 KB (vs ~35 KB today). 35× reduction.
    (L.2) Detail endpoint `GET /bots/id/{meeting_id}` keeps full
          `m.data`. Standard REST list-vs-detail split.
    (L.3) Backward-compat: `?include=data` query parameter restores
          old behavior, default off. Closes the migration concern
          for any caller that depends on full blob today.
    (L.4) Pair with #264: dashboard `meetings-store.ts:103` lowers
          `limit: 50 → 10` AND switches to infinite-scroll. Combined
          with L.1, initial /meetings page load: 1.7 MB → ~10 KB.
    (L.5) Static grep + dynamic check: `list_user_bots` returns
          `data_summary`, NOT raw `m.data`; per-meeting payload <
          2 KB on a populated test fixture.
    No new infrastructure. No DB migration. Industry-standard REST
    projection.
  fix_commits: []
  proves:
    - {check: BOTS_LIST_ENDPOINT_SLIM, modes: [lite, compose]}
    - {check: BOTS_LIST_PAYLOAD_SIZE_BOUNDED, modes: [compose]}
  required_modes: [compose]
  human_verify:
    - mode: compose
      do: "Populate test fixture with 50 meetings; `curl -H 'X-API-Key: $TOKEN' http://meeting-api/bots?limit=50 | wc -c`"
      expect: "Response < 100 KB total (~2 KB per meeting); zero `status_transition[]`/`recordings[]`/`webhook_deliveries[]` arrays in response"
    - mode: compose
      do: "Same request with `?include=data`"
      expect: "Full blob backward-compat path returns ~35 KB per meeting"
    - mode: compose
      do: "GET /bots/id/<id> for one meeting"
      expect: "Detail endpoint returns full `m.data` JSONB unchanged"

