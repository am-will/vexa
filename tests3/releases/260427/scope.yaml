release_id: '260427'  # canonical id matches worktree (vexa-260427) + branch (release/260427)
codename: k8s-stabilize  # human-readable handle, surfaces in release notes / report headers
public_version: v0.10.5
public_name: "v0.10.5 — Production hardening (k8s-stabilize)"
milestone: https://github.com/Vexa-ai/vexa/milestone/14
branch: dev
summary: |
  **v0.10.5 — Production hardening release. ROBUSTNESS, not features.**

  Closes the next layer of "in-process / silent-skip / single-mechanism"
  anti-patterns surfaced after v0.10.4 (Zoom Web bot + 4× CPU reduction)
  went into platform staging. Fifteen packs across six domains: chart
  deployability, bot lifecycle correctness, recording durability, Redis
  client robustness, browser-session reliability, operational
  observability. Migration-free; principle-filtered; SoC clean.
  every one principle-driven (no workarounds, no fallbacks except for
  bot-side code interfacing with non-deterministic external systems
  Zoom/Meet/Teams DOM).

  - A: Helm chart shape — restore tolerations dropped in 0.10.4
    (#272#2), migrations Job becomes a Helm hook (#272#3 / #247),
    minio-init waits for ready (#249), capacityReserve falsy-zero
    fixed (#272#4), NetworkPolicy egress to tx-gateway (#244),
    release-name de-hardcoding (#234), stale values files removed
    (#231).
  - B: Bot pod scheduling + storage env propagation — runtime-api
    profile schema accepts nodeSelector/tolerations/affinity (#250),
    chart values populate them by default (#240), runtimeProfiles
    ConfigMap propagates RECORDING_*/STORAGE_*/MINIO_*/MEETING_API_URL
    to bot pods (#235).
  - C: Redis client robustness — bounded socket timeouts, supervised
    consumer tasks, /readyz startup gate (no Ready pod ever has no
    working consumer), AOF + stop-writes-on-bgsave-error: no shipped
    as a paired durable config. (#267 + #248 + #269)
  - D: Bot lifecycle on K8s — runtime-api returns pod NAME as
    container_id (#261), DELETE container-stop becomes durable via
    Redis Stream outbox mirroring 260421 Pack J (#266), browser-session
    entrypoint exits when node exits (#258, PR #260 already open).
  - E: Recording durability — chunk-finalize moves to outbox pattern
    (#268), Zoom incremental upload re-applied for short-meeting
    audio loss (#272#1), `_delayed_stop_finalizer` REMOVED (redundant
    after 260421 Pack J's durable exit-callback) + replaced with
    idle_loop sweep (#268 [PLATFORM] comment + [OSS] reply).
  - F: helm-prod-shape smoke matrix — CI scaffold exercising tainted
    multi-pool cluster + image bumps + Zoom 30 s-abort. Platform
    contributes the scaffold during develop stage. Closes the
    structural gap that lets the next layer of these same bugs reach
    production. (#272 cross-cutting ask)
  - G: Bot pod log capture — stdout structured JSON discipline +
    JSONB capture compliance-coupled to meeting retention (default
    ON, 50 KB cap, purges with the meeting row) + opt-in long-lived
    aggregator path with explicit data-retention trade-off
    documentation. (#272#6)
  - H: post_meeting transient/permanent classification — dedicated
    `aggregation_failed` terminal state distinct from `failed`,
    transient 5xx retries at the HTTP-client wrapper layer (one
    place, one policy), idle_loop sweep retries for 7 days, terminal
    `aggregation_failed_permanent` after exhaustion. Closes incident
    `2026-04-23-post-meeting-collector-503`.
  - I: Chart availability defaults — replicaCount: 2 + PDB
    minAvailable: 1 + readiness/liveness probes +
    terminationGracePeriodSeconds: 30 for every stateless OSS service
    (apiGateway already done in 260421 Pack G; extends to meetingApi,
    runtimeApi, adminApi, dashboard, transcriptionGateway). State-
    bearing services (Postgres/Redis/MinIO) explicitly NOT touched —
    replication shape is a separate cycle.
  - Cross-cutting: idle_loop heartbeat watcher-of-the-watcher pattern
    inside meeting-api / runtime-api processes. Auto-recover acceptable
    IFF accompanied by guaranteed observability.
    Prometheus alert manifests / scrape pipeline / observability
    infrastructure are [PLATFORM]'s territory (per 2026-04-27 ~15:13Z
    project-owner clarification) — OSS does NOT ship PrometheusRule
    YAML, /metrics endpoints, or prometheus_client deps. OSS provides
    structured log signals where useful (e.g. Pack E.1.a `[E1A]
    chunk_write` line) for [PLATFORM]'s observers to consume.

deployments:
  modes: [lite, compose, helm]
  notes:
    lite: Bot-side stdout-JSON discipline (Pack G.1) is mode-independent; lite is the cheapest canonical mode for static-grep checks against bot source.
    compose: Pack C.4 startup-gate chaos test, Pack D.2 durable-DELETE chaos, Pack E.1 chunk-finalize chaos, Pack E.3 stale-stopping sweep chaos, Pack H aggregation_failed sweep chaos — all need meeting-api + Redis + runtime-api co-located with kill-restore primitives.
    helm: Packs A, B, C.5, F, I are canonical chart contracts; helm is the only mode that exercises chart rendering + actual scheduling/PDB/probe behaviour.

# ── Documented invariants (cross-cutting; converged with [PLATFORM] on #272)
constraints:
  lifecycle_ownership: |
    Meeting + bot lifecycle is owned by the application layer
    (meeting-api + runtime-api + scheduler service). K8s features
    (autoscaling, eviction, restartPolicy, livenessProbe) are
    OBSERVABILITY/SAFETY NETS only — never primary lifecycle
    mechanisms. We want our bugs visible, not hidden behind a K8s
    auto-recover that masks the underlying state-machine defect.

    Audit of v0.10.5 packs against this principle (validated by
    [PLATFORM] code review 2026-04-27 13:42:17Z, #272
    issuecomment-4327366063): every pack respects the constraint.
    K8s probes (Pack C.4 /readyz, Pack I liveness) are app-layer
    SIGNALS observed by K8s — not raw process-up checks. K8s cron
    is the scheduler-as-infrastructure for app-layer sweep LOGIC,
    not a lifecycle trigger.

    Adding K8s-level lifecycle (e.g. `activeDeadlineSeconds` on a
    pod, autoscaling-based eviction, podDisruptionBudget as
    primary completion mechanism) requires explicit groom-stage
    decision + documented bug-visibility tradeoff. Catch-up rule
    for v0.10.6 and beyond.

  media_files_canonical_shape: |
    `meetings.data.recordings[].media_files` is a flat list of
    entries with the invariant: ONE entry per (recording,
    media_type) pair. The entry's metadata reflects the latest
    chunk uploaded for that type (chunk_seq, storage_path,
    file_size_bytes, duration_seconds, is_final).

    Rationale (decision converged with [PLATFORM] on #272
    issuecomment-4327366063, 2026-04-27): per-chunk arrays would
    explode payload size for long recordings + force dashboard UI
    changes to handle N entries per type. Single-entry-per-type is
    Pack E.1.a's existing intent and matches the dashboard's
    fragment-player + seek-to-segment math. Per-chunk history
    remains reconstructable from the MinIO listing under the
    session/type prefix.

    The Pack E.1-sibling reconcile sweep (deferred to v0.11.x) MUST
    maintain this shape: skip if `len(per_type) == 1 AND
    latest_seq == max(S3 seq for that type)`; otherwise rebuild to
    single-entry-per-type shape. Sweep ports of platform-team
    algorithms (which used per-chunk arrays in their environment)
    must be shape-aligned before landing.

# ── Cross-repo cycle dependencies (converged with [PLATFORM] on #272)
cycle_dependencies:
  platform_retirement_gate:
    description: |
      Platform-side `cronjob-recording-reconciler.yaml` retires after a
      24-hour soak of Pack E.1.a v2 in production AND the platform
      production observer (`len(media_files) < distinct_media_types_in_s3`
      audit, see #272 issuecomment-4327676126 + 14:32Z heuristic
      correction) returns 0 orphans across the soak window.
    purpose: |
      Removes the K8s-CronJob-based recovery path in favor of the
      app-layer `_idle_loop_task` sweep (lifecycle_ownership constraint
      above). Once retired, [PLATFORM] absorbs the existing transient
      `asyncpg.TimeoutError` failures that recur on freshly-autoscaled
      nodes (cf. #272 issuecomment-4327983847 root cause analysis); the
      sweep-as-loop architecture eliminates the failure mode entirely
      because the in-process loop inherits the meeting-api pod's
      already-warm asyncpg connection pool.
    retirement_PR_target: vexa-platform/<TBD>  # opened post-soak by [PLATFORM]
    shape_alignment_required: |
      Platform sweep currently writes per-chunk media_files entries.
      MUST be aligned to OSS Option α (one entry per media_type, latest-
      chunk metadata) BEFORE retirement OR run no-op during the overlap
      window to prevent fighting the Pack E.1.a v2 live path. See
      `media_files_canonical_shape` constraint above.
    blocking_for_v0_10_5_ship: false  # [PLATFORM] tracks; not OSS-side gate
    blocking_for_v0_10_6_groom: true  # surface during next groom

  platform_observer_arrival:
    description: |
      Platform-side production observer instrumentation arrives when
      `release/260427`'s meeting-api image reaches production. The
      observer (Prometheus counters + OTel trace spans + their scrape
      pipeline) is owned by [PLATFORM] — NOT in OSS scope at any
      release level. OSS contributes the structured signal that the
      observer consumes (ASK 2: `[E1A] chunk_write` log line) so
      [PLATFORM]'s observer can detect race recurrence via a single
      grep+rate signal rather than an O(N) S3+DB scan per meeting end.
    oss_contributes:
      - "ASK 2 ([E1A] chunk_write structured log line) — recordings.py — landed in this release"
      - "Pack E.1.a v2 lock-before-snapshot fix (Issue 1 critical) — recordings.py — landed in this release"
      - "Reproducer test wired as required-by-mode in matrix — landed in this release"
    platform_owns:
      - "ASK 1 — Prometheus counters / scrape pipeline (their infrastructure tier)"
      - "ASK 3 — OTel trace spans (optional, their infrastructure tier)"
      - "Production-traffic regression observer (heuristic + log-line consumption)"
      - "24h post-deploy soak window classification (any orphans surfaced → reverts retirement)"
    blocking_for_v0_10_5_ship: false

issues:

# ── Pack A — Helm chart shape ────────────────────────────────────────
- id: chart-deploy-shape-restored
  source: gh-issue
  ref: Vexa-ai/vexa#272
  problem: |
    A fresh helm-on-tainted-multi-pool cluster cannot complete a clean
    `helm upgrade` cycle. Six independent template-shape regressions surface
    on first or second upgrade:
    1. Redis / pgbouncer / migrations dropped tolerations blocks in 0.10.4
       — pods Pending forever on any cluster with `:NoSchedule` taints.
    2. migrations Job not a Helm hook → `Job spec immutable` error on
       every image-tag bump → atomic rollback.
    3. minio-init `sleep 5` races MinIO PVC mount → bucket never created
       → recordings 500 with `NoSuchBucket`.
    4. `capacityReserve.replicas: 0` silently renders as `replicas: 3`
       (Go template falsy-zero anti-pattern).
    5. allow-meeting-api NetworkPolicy missing tx-gateway egress → batch
       transcribe HTTP 500 with empty error after 120 s on default-deny
       clusters.
    6. service references hardcode `vexa-platform-vexa-redis` → any
       non-default release name (`helm install vexa-prod`) breaks DNS
       resolution.
    Plus: stale `values-staging.yaml` + `values-test.yaml` should be deleted.
  hypothesis: |
    Pure chart edits, no application-code change. Each fix extends an
    existing chart pattern (the chart already supports `global.tolerations`
    via `{{- with }}` blocks that 0.10.4 dropped from three templates;
    `helm.sh/hook` annotations are idiomatic for migration Jobs;
    `mc ready` is the official MinIO readiness primitive; `hasKey` is
    the standard Go-template guard against falsy-zero; the chart already
    has a `vexa.fullname` helper for `{{ include "vexa.fullname" . }}-foo`
    patterns elsewhere). Restoration + extension, not invention.
  fix_commits: []
  proves:
    - {check: HELM_TOLERATIONS_PROPAGATED, modes: [helm]}
    - {check: HELM_UPGRADE_TWICE_NO_JOB_IMMUTABLE, modes: [helm]}
    - {check: HELM_FRESH_INSTALL_BUCKETS_PRESENT, modes: [helm]}
    - {check: HELM_CAPACITY_RESERVE_ZERO, modes: [helm]}
    - {check: HELM_NETWORK_POLICY_TX_GATEWAY, modes: [helm]}
    - {check: HELM_NO_HARDCODED_RELEASE_NAME, modes: [helm]}
  required_modes: [helm]
  human_verify:
    - mode: helm
      do: "Apply `--set global.tolerations='[{key: workload, operator: Equal, value: bot, effect: NoSchedule}]'` to a tainted-cluster install"
      expect: "Every Deployment + StatefulSet + Job pod schedules; zero `Pending` pods after 60 s"
    - mode: helm
      do: "Run `helm upgrade <release> <chart> --set meetingApi.image.tag=<new>` twice in sequence"
      expect: "Both upgrades succeed; zero `Job spec immutable` errors; migrations Job recreated as a hook"
    - mode: helm
      do: "Fresh `helm install` on a cluster with provisioning-delayed PVC backend"
      expect: "After install completes, `mc ls vexa/` shows expected buckets; minio-init Job exited 0"
    - mode: helm
      do: "Render with `--set capacityReserve.replicas=0`"
      expect: "Rendered output contains `replicas: 0` (zero is honoured, not silently bumped to 3)"
    - mode: helm
      do: "From inside meeting-api: `nc -vz <release>-vexa-transcription-gateway 8084`"
      expect: "Connection succeeds; default-deny does not block the path"
    - mode: helm
      do: "`helm install vexa-prod ...` (non-default release name)"
      expect: "All services come up Ready; zero `getaddrinfo ENOTFOUND` log entries; `redisConfig.url` resolves to `vexa-prod-vexa-redis`"

# ── Pack B — Bot pod scheduling + storage env ────────────────────────
- id: bot-pod-scheduling-and-storage-env
  source: gh-issue
  ref: Vexa-ai/vexa#240
  problem: |
    Bot pods (created at runtime by runtime-api from the
    `vexa-runtime-profiles` ConfigMap) suffer two silent failures on
    any production-shape cluster:
    (a) The runtime-api profile schema does NOT accept `nodeSelector` /
        `tolerations` / `affinity` (#250) — even though kubernetes.py
        backend already reads them. Schema rejects unknown keys.
    (b) Chart values' `runtimeProfiles.{meeting,browser-session}.env`
        does NOT propagate `RECORDING_ENABLED` / `STORAGE_BACKEND` /
        `MINIO_*` / `MEETING_API_URL` to bot pods (#235). Result: bot
        transcribes (has TRANSCRIPTION_SERVICE_*) and silently skips
        recording upload (no endpoint to POST to).
    Production evidence (#235): prod MinIO 0 objects despite real-time
    transcripts flowing normally. User receives "transcribed meeting"
    promise; the recording behind post-meeting batch transcription is
    silently dropped.
  hypothesis: |
    Two paired fixes:
    (B.1) runtime-api profile schema accepts native K8s pod-spec keys
          (`nodeSelector`, `tolerations`, `affinity`); the kubernetes
          backend already maps them at L131/L141-144.
    (B.2) Chart values default `runtimeProfiles.{...}.nodeSelector` +
          `tolerations` from new top-level `global.botNodeSelector` +
          `global.botTolerations` (mirroring existing
          `global.nodeSelector` / `global.tolerations` for chart-managed
          Deployments).
    (B.3) Define `vexa.botStorageEnv` helper in `_helpers.tpl` mirroring
          meeting-api's secretKeyRef pattern; runtimeProfiles' env block
          consumes the helper.
    Both halves must land together — fixing chart values without the
    schema half is silently ignored by runtime-api. Same drift-prevention
    shape as 260421 Pack A.
  fix_commits: []
  proves:
    - {check: RUNTIME_PROFILE_SCHEMA_ACCEPTS_K8S_KEYS, modes: [lite, compose, helm]}
    - {check: BOT_POD_SCHEDULING_FROM_PROFILE, modes: [helm]}
    - {check: BOT_POD_RECORDING_ENV_PROPAGATED, modes: [helm]}
  required_modes: [helm, compose]
  human_verify:
    - mode: helm
      do: "On a cluster with a dedicated bot pool tainted `workload=bot:NoSchedule`, install with `--set global.botTolerations='[{key: workload, value: bot}]' --set global.botNodeSelector='{workload: bot}'`; dispatch a bot via meeting-api"
      expect: "Bot pod schedules on the bot-pool node; zero pods landing on non-bot nodes"
    - mode: helm
      do: "Dispatch a bot, observe `kubectl exec` env on the bot pod"
      expect: "Bot env contains `RECORDING_ENABLED`, `STORAGE_BACKEND`, `MEETING_API_URL`, `MINIO_BUCKET` (or `S3_*` if S3 backend); bot's `/internal/recordings/upload` calls succeed"
    - mode: compose
      do: "Run a Zoom/Meet/Teams meeting end-to-end"
      expect: "After meeting completes, `mc ls vexa-recordings/...` shows ≥1 chunk for the session; `meetings.data.recordings[].media_files` populated"

# ── Pack C — Redis client robustness ─────────────────────────────────
- id: redis-client-robustness-layered
  source: gh-issue
  ref: Vexa-ai/vexa#267
  problem: |
    Two reproduced production incidents (2026-04-21 cascade, 2026-04-26
    silent hang with 10.5 h data loss + 20 lost transcripts) share the
    root cause: every `aioredis.from_url(...)` call across vexa services
    lacks `socket_timeout`, `socket_connect_timeout`, `socket_keepalive`,
    `health_check_interval`. redis-py defaults to "wait forever for the
    socket"; OS TCP keepalive default is 7200 s. Failure modes:
    - Silent hang: `xreadgroup(... block=2000)` sits inside a single
      `await` for hours after a Redis pod kill; consumer alive in K8s's
      view, dead in reality; no exception, no log line.
    - Visible cascade: Redis hits MISCONF (BGSAVE failure), refuses
      writes for 46 min; client TCP connections stay open but every
      write rejected; client pools never reconnect after Redis recovers.
    - Startup variant (#267 [PLATFORM] comment): try/except catches
      Redis-not-yet-ready, leaves `redis_client = None`, silently skips
      `xgroup_create + consume_redis_stream`. Pod stays Ready; serves
      HTTP; consumer dead for the lifetime of the pod.
    - Runtime-api startup (#248): no exponential-backoff on Redis init;
      CrashLoopBackOff if Redis not ready at deploy time.
  hypothesis: |
    Layered fix — every layer closes a distinct failure class:
    (C.1) L1 — bounded socket config across every aioredis.from_url
          call site (~5 services): socket_timeout=10,
          socket_connect_timeout=5, socket_keepalive=True,
          health_check_interval=30, retry_on_timeout=True. Closes
          unbounded await on dead socket.
    (C.2) L2 — task-restart `_restart_on_crash` done-callback on
          consume_redis_stream / consume_speaker_events_stream /
          process_redis_to_postgres. Closes "consumer task crashes
          silently."
    (C.3) L3 — meeting-api `/health/collector` lag-aware livenessProbe
          (lag>100 + max_consumer_idle>60s = 503). Worst-case data
          loss bounded at ~90 s for any future failure mode.
    (C.4) /readyz startup gate driven by `startup_complete: bool`
          flag; flips True only after Redis ping succeeds AND consumer
          tasks alive. Bounded retry inside the ping helper, then
          RAISE on exhaustion (let K8s `restartPolicy: Always` handle
          ordering). No silent-degraded mode anywhere.
    (C.5) Redis durability: `appendonly yes` + `appendfsync everysec`
          + `stop-writes-on-bgsave-error: no` shipped as a PAIRED
          config (template-time `required` guard refuses one without
          the other). AOF is per-write durability; BGSAVE failures
          become non-blocking. Industry-standard Redis-as-stream-buffer
          shape.
    Closes #267 + #248 + #269 (dashboard WS lost updates is a downstream
    symptom of #267 silent hang; closes when L1 lands).
  fix_commits: []
  proves:
    - {check: REDIS_CLIENT_HARDENED_TIMEOUTS, modes: [lite, compose, helm]}
    - {check: MEETING_API_COLLECTOR_LIVENESS, modes: [compose]}
    - {check: MEETING_API_READYZ_GATES_CONSUMER, modes: [compose]}
    - {check: RUNTIME_API_REDIS_STARTUP_RETRY, modes: [compose]}
    - {check: MEETING_API_COLLECTOR_RECOVERS_AFTER_REDIS_KILL, modes: [compose]}
    - {check: REDIS_AOF_AND_BGSAVE_PAIRED, modes: [helm]}
  required_modes: [compose, helm]
  human_verify:
    - mode: compose
      do: "Start meeting + bot streaming transcripts; `kubectl delete pod redis` (or `docker kill` in compose); wait for Redis to come back Ready"
      expect: "After Redis recovers, transcripts table writes resume within 10 s; consumer idle metric resets; no manual restart of meeting-api needed"
    - mode: compose
      do: "Start meeting-api with Redis NOT YET reachable (delay Redis startup by 30 s)"
      expect: "Meeting-api remains NotReady (`/readyz` returns 503) for 30 s; Service does not route traffic; flips to Ready within 5 s of Redis becoming reachable"
    - mode: helm
      do: "Render chart with `--set redis.config.bgsaveErrorBlocksWrites=true` (attempt to force the unsafe combination)"
      expect: "`helm template` exits non-zero with `required` error: AOF must be enabled together with stop-writes-on-bgsave-error: no"

# ── Pack D — Bot lifecycle on K8s ────────────────────────────────────
- id: bot-lifecycle-orphan-pod-prevention
  source: gh-issue
  ref: Vexa-ai/vexa#266
  problem: |
    Three independent bugs each leave bot pods consuming K8s slots
    indefinitely, compounding into capacity exhaustion under load:
    (a) #261: runtime-api K8s backend returns `container_id =
        pod.metadata.uid` (UUID), but meeting-api's later DELETE looks
        the pod up by NAME via `delete_namespaced_pod(name=name)` →
        404 → silent no-op → bot pod runs forever.
    (b) #266: meeting-api's DELETE container-stop runs as a FastAPI
        BackgroundTask (`_delayed_container_stop`) with no retry, no
        DLQ, no reconciliation. Production scale test (release-006,
        20-bot Google Meet): 3-of-20 DELETEs returned HTTP 500 with
        meeting marked `COMPLETED` while the pod kept running
        (recording, uploading) for 12+ minutes.
    (c) #258: browser-session entrypoint `wait` (no args) keeps the
        container alive forever after `node dist/docker.js` exits;
        x11vnc + websockify never return; pod stays Running for VNC
        access but K8s never sees termination. Already addressed by
        OPEN PR #260 — needs review + merge in this cycle.
  hypothesis: |
    (D.1) runtime-api K8s backend returns pod NAME as `container_id`,
          not UID. Same field, different value. ~5-line fix.
    (D.2) Replace BackgroundTask with the Redis-Stream outbox pattern
          from 260421 Pack J: push stop-intent to a stream, idle_loop
          consumer pops + retries with exponential backoff + DLQ.
          Idempotent stop on runtime-api side (already 200 no-op for
          stopping-already-stopped). Same pattern, new entry surface.
    (D.3) browser-session entrypoint: change `wait` (no args) to
          `wait $NODE_PID` so the entrypoint exits when node exits.
          VNC services become opt-in via `KEEP_ALIVE_AFTER_NODE_EXIT=true`
          env. Pair with `terminationGracePeriodSeconds: 30` in the
          browser-session profile. PR #260 already implements this.
  fix_commits: []
  proves:
    - {check: K8S_BACKEND_CONTAINER_ID_IS_NAME, modes: [lite, compose, helm]}
    - {check: BOT_DELETE_DURABLE_RETRY, modes: [compose]}
    - {check: BROWSER_SESSION_POD_TERMINATES_ON_NODE_EXIT, modes: [compose]}
  required_modes: [compose]
  human_verify:
    - mode: compose
      do: "Dispatch 20 bots into one meeting in quick succession; sequentially DELETE each with 3 s spacing while runtime-api experiences brief connectivity blips (`docker pause runtime-api` for 5 s every 4th delete)"
      expect: "All 20 bot pods terminated within (last_delete + IDLE_CHECK_INTERVAL); zero pods in `Running` state with `runtime.managed=true` afterwards"
    - mode: compose
      do: "Dispatch a browser-session bot, then `docker exec <pod> kill -9 <node-pid>`"
      expect: "Pod transitions to `Succeeded` (or `Completed`) within 60 s; without the entrypoint fix it would stay `Running` forever"

# ── Pack E — Recording durability ────────────────────────────────────
- id: recording-durability-across-restart
  source: gh-issue
  ref: Vexa-ai/vexa#268
  problem: |
    Three distinct recording-durability bugs with shared root pattern
    "in-process / in-request transient state where it must be durable":
    (a) #268: meeting-api pod restart drops `is_final=true` JSONB
        finalization. S3 has chunks; `meetings.data.recordings[].media_files`
        is `[]`. Reproduced today on prod meeting 11010 (53 chunks in S3,
        manual recovery required to populate JSONB).
    (b) #272#1: Zoom Web meetings stopped within 30 s lose all audio.
        `RecordingService` only uploads on `performGracefulLeave()`;
        SHUTDOWN_TIMEOUT_MS racing earlier cleanup steps.
        Commit 58ba53e (incremental upload every 10 s) was reverted in
        24e0641 with reason "never tested in a live meeting." Never
        re-applied for Zoom paths (Google Meet + Teams already have
        equivalent).
    (c) #268 [PLATFORM] comment: meeting-api's `_delayed_container_stop`
        90 s timer (`asyncio.sleep` inside FastAPI BackgroundTask) +
        the inline `_delayed_stop_finalizer` block — coroutine dies on
        meeting-api restart, meeting stuck in `stopping` forever.
        Production evidence: rows with `status='stopping'` for >24 h.
        After 260421 Pack J shipped durable exit-callback in runtime-api,
        the in-process timer is REDUNDANT defense, not load-bearing.
  hypothesis: |
    (E.1) Chunk-finalize moves to outbox: `POST /internal/recordings/upload`
          uploads to S3 then `XADD recording_finalizations` with chunk
          metadata; idle_loop consumer ACID-writes
          `meetings.data.recordings[].media_files`. Idempotent (keyed
          off `chunk_seq + media_type + session_uid`).
    (E.1-sibling) `sweep_unfinalized_recordings` in idle_loop catches
          recording rows with chunks-in-S3-but-empty-media_files. Pairs
          with Prometheus alert (cross-cutting). Retires
          `cronjob-recording-reconciler` on platform side.
