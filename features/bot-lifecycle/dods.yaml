gate:
  confidence_min: 90
# Bot-runtime DoDs re-canonicalised to helm mode in 260419-helm round-3:
# this release proved the helm LKE provision path end-to-end and needs
# the gate to fail on any future helm-bot regression. Container-test
# mode coverage remains per-step — containers.sh still runs on every
# scope mode; its DoD binding expresses the canonical mode for gate
# scoring. A future cycle can widen to [compose, helm] once compose
# evidence is refreshed in-cycle.
dods:
- id: create-ok
  label: POST /bots spawns a bot container and returns a bot id
  weight: 15
  evidence:
    test: containers
    step: create
    modes:
    - helm
- id: create-alive
  label: Bot process is running 10s after creation (not crash-looping)
  weight: 15
  evidence:
    test: containers
    step: alive
    modes:
    - helm
- id: bots-status-not-422
  label: GET /bots/status never returns 422 (schema stable under concurrent writes)
  weight: 5
  evidence:
    check: BOTS_STATUS_NOT_422
    modes:
    - lite
    - compose
    - helm
- id: removal
  label: Container fully removed after DELETE /bots/...
  weight: 10
  evidence:
    test: containers
    step: removal
    modes:
    - helm
- id: status-completed
  label: Meeting.status=completed after stop (not failed/stuck)
  weight: 10
  evidence:
    test: containers
    step: status_completed
    modes:
    - helm
- id: graceful-leave
  label: Bot leaves the meeting gracefully on stop (no force-kill by default)
  weight: 5
  evidence:
    check: GRACEFUL_LEAVE
    modes:
    - lite
    - compose
    - helm
- id: route-collision
  label: "No Starlette route collisions \u2014 /bots/{id} and /bots/{platform}/{native_id} do not clash"
  weight: 5
  evidence:
    check: ROUTE_COLLISION
    modes:
    - lite
    - compose
    - helm
- id: timeout-stop
  label: Bot auto-stops after automatic_leave timeout (no_one_joined_timeout)
  weight: 10
  evidence:
    test: containers
    step: timeout_stop
    modes:
    - helm
- id: concurrency-slot
  label: "Concurrent-bot slot released immediately on stop \u2014 next create succeeds"
  weight: 10
  evidence:
    test: containers
    step: concurrency_slot
    modes:
    - helm
- id: no-orphans
  label: No zombie/exited bot containers left after a lifecycle run
  weight: 10
  evidence:
    test: containers
    step: no_orphans
    modes:
    - helm
- id: status-webhooks-fire
  label: Status-change webhooks fire for every transition when enabled in webhook_events
  weight: 5
  evidence:
    test: webhooks
    step: e2e_status
    modes:
    - helm

# ── 260421-prod-stabilize additions ─────────────────────────────────
- id: recording-incremental-chunk-upload
  label: "bot uploads each MediaRecorder chunk as it arrives; meeting-api accepts chunk_seq on /internal/recordings/upload"
  weight: 15
  evidence:
    check: RECORDING_UPLOAD_SUPPORTS_CHUNK_SEQ
    modes:
    - lite
    - compose

- id: bot-records-incrementally
  label: "bot recording.ts calls MediaRecorder.start with ≥15s timeslice AND uploads each chunk via __vexaSaveRecordingChunk"
  weight: 10
  evidence:
    check: BOT_RECORDS_INCREMENTALLY
    modes:
    - lite
    - compose

- id: recording-survives-mid-meeting-kill
  label: "SIGKILL mid-recording leaves already-uploaded chunks durable in MinIO; Recording.status stays IN_PROGRESS until is_final=true"
  weight: 10
  evidence:
    check: RECORDING_SURVIVES_MID_MEETING_KILL
    modes:
    - compose

- id: runtime-api-stop-grace-matches-pod-spec
  label: "runtime-api delete_namespaced_pod grace_period_seconds matches the pod spec terminationGracePeriodSeconds"
  weight: 5
  evidence:
    check: RUNTIME_API_STOP_GRACE_MATCHES_POD_SPEC
    modes:
    - helm

- id: runtime-api-exit-callback-durable
  label: "runtime-api exit callback delivery is durable across consumer outages (idle_loop re-sweeps pending records)"
  weight: 10
  evidence:
    check: RUNTIME_API_EXIT_CALLBACK_DURABLE
    modes:
    - compose

- id: runtime-api-idle-loop-sweeps-pending-callbacks
  label: "services/runtime-api lifecycle.py idle_loop iterates pending callbacks each tick and retries delivery"
  weight: 5
  evidence:
    check: RUNTIME_API_IDLE_LOOP_SWEEPS_PENDING_CALLBACKS
    modes:
    - lite
    - compose
