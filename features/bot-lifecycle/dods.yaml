gate:
  confidence_min: 90
# Bot-runtime DoDs re-canonicalised to helm mode in 260419-helm round-3:
# this release proved the helm LKE provision path end-to-end and needs
# the gate to fail on any future helm-bot regression. Container-test
# mode coverage remains per-step — containers.sh still runs on every
# scope mode; its DoD binding expresses the canonical mode for gate
# scoring. A future cycle can widen to [compose, helm] once compose
# evidence is refreshed in-cycle.
dods:
- id: create-ok
  label: POST /bots spawns a bot container and returns a bot id
  weight: 15
  evidence:
    test: containers
    step: create
    modes:
    - helm
- id: create-alive
  label: Bot process is running 10s after creation (not crash-looping)
  weight: 15
  evidence:
    test: containers
    step: alive
    modes:
    - helm
- id: bots-status-not-422
  label: GET /bots/status never returns 422 (schema stable under concurrent writes)
  weight: 5
  evidence:
    check: BOTS_STATUS_NOT_422
    modes:
    - lite
    - compose
    - helm
- id: removal
  label: Container fully removed after DELETE /bots/...
  weight: 10
  evidence:
    test: containers
    step: removal
    modes:
    - helm
- id: status-completed
  label: Meeting.status=completed after stop (not failed/stuck)
  weight: 10
  evidence:
    test: containers
    step: status_completed
    modes:
    - helm
- id: graceful-leave
  label: Bot leaves the meeting gracefully on stop (no force-kill by default)
  weight: 5
  evidence:
    check: GRACEFUL_LEAVE
    modes:
    - lite
    - compose
    - helm
- id: route-collision
  label: "No Starlette route collisions \u2014 /bots/{id} and /bots/{platform}/{native_id} do not clash"
  weight: 5
  evidence:
    check: ROUTE_COLLISION
    modes:
    - lite
    - compose
    - helm
- id: timeout-stop
  label: Bot auto-stops after automatic_leave timeout (no_one_joined_timeout)
  weight: 10
  evidence:
    test: containers
    step: timeout_stop
    modes:
    - helm
- id: concurrency-slot
  label: "Concurrent-bot slot released immediately on stop \u2014 next create succeeds"
  weight: 10
  evidence:
    test: containers
    step: concurrency_slot
    modes:
    - helm
- id: no-orphans
  label: No zombie/exited bot containers left after a lifecycle run
  weight: 10
  evidence:
    test: containers
    step: no_orphans
    modes:
    - helm
- id: status-webhooks-fire
  label: Status-change webhooks fire for every transition when enabled in webhook_events
  weight: 5
  evidence:
    test: webhooks
    step: e2e_status
    modes:
    - helm

# ── 260421-prod-stabilize additions ─────────────────────────────────
- id: recording-incremental-chunk-upload
  label: "bot uploads each MediaRecorder chunk as it arrives; meeting-api accepts chunk_seq on /internal/recordings/upload"
  weight: 15
  evidence:
    check: RECORDING_UPLOAD_SUPPORTS_CHUNK_SEQ
    modes:
    - lite
    - compose

- id: bot-records-incrementally
  label: "bot recording.ts calls MediaRecorder.start with ≥15s timeslice AND uploads each chunk via __vexaSaveRecordingChunk"
  weight: 10
  evidence:
    check: BOT_RECORDS_INCREMENTALLY
    modes:
    - lite
    - compose

- id: recording-survives-mid-meeting-kill
  label: "SIGKILL mid-recording leaves already-uploaded chunks durable in MinIO; Recording.status stays IN_PROGRESS until is_final=true"
  weight: 10
  evidence:
    check: RECORDING_SURVIVES_MID_MEETING_KILL
    modes:
    - compose

- id: runtime-api-stop-grace-matches-pod-spec
  label: "runtime-api delete_namespaced_pod grace_period_seconds matches the pod spec terminationGracePeriodSeconds"
  weight: 5
  evidence:
    check: RUNTIME_API_STOP_GRACE_MATCHES_POD_SPEC
    modes:
    - helm

- id: runtime-api-exit-callback-durable
  label: "runtime-api exit callback delivery is durable across consumer outages (idle_loop re-sweeps pending records)"
  weight: 10
  evidence:
    check: RUNTIME_API_EXIT_CALLBACK_DURABLE
    modes:
    - compose

- id: runtime-api-idle-loop-sweeps-pending-callbacks
  label: "services/runtime-api lifecycle.py idle_loop iterates pending callbacks each tick and retries delivery"
  weight: 5
  evidence:
    check: RUNTIME_API_IDLE_LOOP_SWEEPS_PENDING_CALLBACKS
    modes:
    - lite
    - compose

- id: bot-video-default-off
  label: "POST /bots `video` field defaults to False — video recording is opt-in, not opt-out"
  weight: 5
  evidence:
    check: BOT_VIDEO_DEFAULT_OFF
    modes:
    - lite
    - compose

# v0.10.5.3 FM-274 regression guard — three-layer defense for the bot
# hallucination corpus. The original FM-274 (corpus dropped when
# WhisperLive was removed, v0.10.0) shipped to prod and leaked
# "thanks for watching" / "subscribe to my channel" hallucinations into
# customer transcripts for ~3 months because:
#   1. Corpus files weren't required by any DoD (orphan static check)
#   2. .gitignore *.txt rule silently dropped restoration attempts
#   3. Build script `2>/dev/null;` swallowed the cp's missing-source error
# Each layer below pins one of the three. Total weight 15 = same gate-pull
# as create-ok / create-alive, reflecting transcript-quality importance.

- id: hallucination-corpus-present
  label: "bot hallucination corpus (en, es, pt, ru) exists at services/vexa-bot/core/src/services/hallucinations/ — non-empty, ≥5 phrases each"
  weight: 5
  evidence:
    check: HALLUCINATION_CORPUS_PRESENT
    modes:
    - lite
    - compose
    - helm

- id: hallucination-corpus-gitignore-exception
  label: ".gitignore has the negation rule '!services/vexa-bot/core/src/services/hallucinations/*.txt' protecting the corpus from the global '*.txt' ignore"
  weight: 5
  evidence:
    check: HALLUCINATION_CORPUS_GITIGNORE_EXCEPTION
    modes:
    - lite
    - compose
    - helm

- id: hallucination-corpus-build-fail-loud
  label: "core/package.json build script uses '&&' (fail-fast) for the cp step, not '2>/dev/null;' (silent-fail) — corpus copy failure aborts build"
  weight: 5
  evidence:
    check: HALLUCINATION_CORPUS_BUILD_FAIL_LOUD
    modes:
    - lite
    - compose
    - helm

# ── v0.10.6 Pack U — audio recording unification ────────────────────
# Pack U structurally fixes the audio playback regression (Pack M's
# chunk-buffer cap broke bot-side master construction → ~270KB
# unplayable fragments) AND the long-standing crash-mid-meeting audio
# loss class. Master is now built server-side at bot_exit_callback;
# bot-side capture is unified across GMeet/Teams/Zoom Web via
# services/audio-pipeline.ts. ~2300 LOC of platform duplication deleted.

- id: shared-audio-pipeline-module-exists
  label: "services/vexa-bot/core/src/services/audio-pipeline.ts exports UnifiedRecordingPipeline + MediaRecorderCapture + PulseAudioCapture — single bot-side capture module driving all 3 platforms"
  weight: 5
  evidence:
    check: SHARED_AUDIO_PIPELINE_MODULE_EXISTS
    modes:
    - lite
    - compose
    - helm

- id: gmeet-recording-uses-shared-pipeline
  label: "googlemeet/recording.ts imports UnifiedRecordingPipeline + MediaRecorderCapture from services/audio-pipeline (Pack U.2 — no longer hand-rolls MediaRecorder boilerplate)"
  weight: 10
  evidence:
    check: GMEET_RECORDING_USES_SHARED_PIPELINE
    modes:
    - lite
    - compose
    - helm

- id: teams-recording-uses-shared-pipeline
  label: "msteams/recording.ts imports UnifiedRecordingPipeline + MediaRecorderCapture from services/audio-pipeline (Pack U.3)"
  weight: 10
  evidence:
    check: TEAMS_RECORDING_USES_SHARED_PIPELINE
    modes:
    - lite
    - compose
    - helm

- id: zoom-web-recording-uses-shared-pipeline
  label: "zoom/web/recording.ts imports UnifiedRecordingPipeline + PulseAudioCapture; chunked-upload model (Pack U.4 — pre-Pack-U: total audio loss on bot crash)"
  weight: 10
  evidence:
    check: ZOOM_WEB_RECORDING_USES_SHARED_PIPELINE
    modes:
    - lite
    - compose
    - helm

- id: zoom-web-uploads-chunks-periodically
  label: "PulseAudioCapture in audio-pipeline.ts emits 15s WAV chunks during a Zoom meeting (uploadChunk fires multiple times before finalize)"
  weight: 10
  evidence:
    check: ZOOM_WEB_UPLOADS_CHUNKS_PERIODICALLY
    modes:
    - lite
    - compose
    - helm

- id: platform-recording-ts-line-budget
  label: "after Pack U unification, every platform recording.ts is within LOC budget (gmeet ≤ 800, msteams ≤ 1000, zoom/web ≤ 200) — captures the duplication-removal as a static guard"
  weight: 5
  evidence:
    check: PLATFORM_RECORDING_TS_LINE_BUDGET
    modes:
    - lite

- id: no-per-platform-master-construction
  label: "no platform recording.ts retains __vexaSaveRecordingBlob or __vexaRecordedChunks master-blob assembly — master is exclusively server-side"
  weight: 10
  evidence:
    check: NO_PER_PLATFORM_MASTER_CONSTRUCTION
    modes:
    - lite

- id: bot-kill-recording-playable-gmeet
  label: "after SIGKILL'ing a GMeet bot mid-recording, server-side finalize_recording_master builds master.webm from chunks already in MinIO → ffprobe-playable. Crash-safety the bot couldn't provide pre-Pack-U."
  weight: 15
  evidence:
    check: BOT_KILL_RECORDING_PLAYABLE_GMEET
    modes:
    - compose
    - helm

- id: bot-kill-recording-playable-teams
  label: "Teams equivalent — SIGKILL bot, master built post-callback, ffprobe-playable"
  weight: 15
  evidence:
    check: BOT_KILL_RECORDING_PLAYABLE_TEAMS
    modes:
    - compose
    - helm

- id: bot-kill-recording-playable-zoom
  label: "Zoom Web equivalent — SIGKILL bot, master.wav built from chunked PulseAudio uploads, ffprobe-playable. Pre-Pack-U Zoom crash = total audio loss; this DoD certifies the recovery."
  weight: 15
  evidence:
    check: BOT_KILL_RECORDING_PLAYABLE_ZOOM
    modes:
    - compose
